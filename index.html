<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rverx</title>

<style>
body{
 margin:0;
 background:black;
 color:#00ffcc;
 font-family:monospace;
}

/* MATRIX */
canvas{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 z-index:-1;
}

/* LOGO */
.logo{
 width:110px;
 height:110px;
 border-radius:50%;
 display:block;
 margin:10px auto;
 border:2px solid #00ffcc;
 box-shadow:0 0 15px #00ffcc, inset 0 0 10px #00ffcc;
}

/* VIDEO */
.video{
 width:100%;
 max-width:320px;
 display:block;
 margin:10px auto;
 border-radius:10px;
 box-shadow:0 0 20px #00ffcc55;
}

/* BOX */
.box{
 background:rgba(0,0,0,0.7);
 border:1px solid #00ffcc55;
 padding:15px;
 margin:10px;
 border-radius:10px;
 backdrop-filter:blur(6px);
}

/* INPUT */
input,select{
 width:90%;
 padding:10px;
 margin:5px;
 background:black;
 border:1px solid #00ffcc;
 color:#00ffcc;
}

/* BUTTON */
button{
 width:90%;
 padding:10px;
 margin:5px;
 background:#00ffcc;
 border:none;
 color:black;
 font-weight:bold;
 cursor:pointer;
}
button:hover{transform:scale(1.05)}

/* TAB */
.tabs{
 display:flex;
 justify-content:space-around;
 margin-top:10px;
}
.tab{
 cursor:pointer;
 padding:10px;
 border-bottom:2px solid transparent;
}
.tab.active{
 border-bottom:2px solid #00ffcc;
}

/* CONTENT */
.tabContent{display:none}
.list{
 max-height:250px;
 overflow:auto;
 white-space:pre-line;
 font-size:12px;
}

/* TERMINAL */
#terminal{
 height:120px;
 overflow:auto;
 font-size:11px;
 border-top:1px solid #00ffcc;
 margin-top:10px;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="login">
<img src="https://files.catbox.moe/bi2bn4.png" class="logo">

<video src="https://files.catbox.moe/lnj4we.mp4" autoplay loop muted class="video"></video>

<div class="box">
<input id="user" placeholder="USERNAME">
<input id="pass" placeholder="PASSWORD">

<button onclick="login()">🔓 BERIKUTNYA</button>
<button onclick="window.close()">❌ KEMBALI</button>
</div>
</div>

<!-- MENU -->
<div id="menu" style="display:none">

<img src="https://files.catbox.moe/bi2bn4.png" class="logo">

<video src="https://files.catbox.moe/lnj4we.mp4" autoplay loop muted class="video"></video>

<div class="tabs">
<div class="tab active" onclick="openTab(event,'type')">⚡ TYPE</div>
<div class="tab" onclick="openTab(event,'list')">📜 LIST</div>
<div class="tab" onclick="openTab(event,'digital')">🌐 DIGITAL</div>
<div class="tab" id="tabKey" onclick="openTab(event,'key')" style="display:none">🔑 KEY</div>
</div>

<!-- TYPE -->
<div class="box tabContent" id="type" style="display:block">
<input id="number" placeholder="62XXXXXXXXX">

<select id="bugType">
<option>DELAY HARD</option>
<option>FORCE CLOSE</option>
<option>BLANK UI</option>
<option>ATTACK IOS</option>
</select>

<button onclick="run()">🚀 RUN</button>

<div id="terminal"></div>
</div>

<!-- LIST -->
<div class="box tabContent" id="list">
<div class="list">
⚓STOK YANZZ⚓
- DRIP CLINET 10K
- AIMLOCK 75% 4K
- HEADLOCK 75% 5K
- BODY LOCK V1 5K
- GS FILE 5K
- DLL (FULL LIST)
</div>
</div>

<!-- DIGITAL -->
<div class="box tabContent" id="digital">
<button onclick="order()">🛒 ORDER</button>
<button onclick="go('https://chat.whatsapp.com')">💬 FJB</button>
<button onclick="go('https://instagram.com')">📸 IG</button>
<button onclick="go('https://youtube.com')">▶️ YT</button>
</div>

<!-- KEY -->
<div class="box tabContent" id="key">
<input id="newKey" placeholder="INPUT KEY">

<select id="durasi">
<option value="1">1 HARI</option>
<option value="3">3 HARI</option>
<option value="7">7 HARI</option>
<option value="30">1 BULAN</option>
<option value="365">1 TAHUN</option>
<option value="perm">PERMANEN</option>
</select>

<button onclick="buatKey()">GENERATE</button>
<div id="hasilKey"></div>
</div>

<button onclick="logout()">🚪 LOGOUT</button>

</div>

<script>

// MATRIX
let c=document.getElementById("matrix")
let ctx=c.getContext("2d")
c.width=innerWidth
c.height=innerHeight
let letters="RVERX01"
let drops=Array(100).fill(1)
setInterval(()=>{
 ctx.fillStyle="rgba(0,0,0,0.05)"
 ctx.fillRect(0,0,c.width,c.height)
 ctx.fillStyle="#0f0"
 drops.forEach((y,i)=>{
  let t=letters[Math.floor(Math.random()*letters.length)]
  ctx.fillText(t,i*10,y*10)
  if(y*10>c.height) drops[i]=0
  drops[i]++
 })
},50)

// SOUND
function sound(f){
 let a=new AudioContext()
 let o=a.createOscillator()
 o.connect(a.destination)
 o.frequency.value=f
 o.start()
 setTimeout(()=>o.stop(),80)
}

// LOGIN
let role="guest"
function login(){
 sound(500)

 if(user.value=="YanzzMEMBER" && pass.value=="12345678"){
  role="member"
 }

 else if(user.value=="YanzzOWNER" && pass.value=="27051210#$+-"){
  role="admin"
  tabKey.style.display="block"
 }

 else if(user.value=="VIP"){
  let data=getKeys()
  let f=data.find(x=>x.key==pass.value)
  if(!f) return alert("KEY SALAH")

  if(f.exp!="PERMANEN" && Date.now()>f.exp){
   return alert("KEY EXPIRED")
  }

  data=data.filter(x=>x.key!=pass.value)
  saveKeys(data)

  role="vip"
 }

 else return alert("LOGIN SALAH")

 login.style.display="none"
 menu.style.display="block"
}

// TAB
function openTab(e,id){
 document.querySelectorAll(".tabContent").forEach(x=>x.style.display="none")
 document.getElementById(id).style.display="block"
 document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))
 e.target.classList.add("active")
}

// RUN
function run(){
 if(role=="member" && bugType.value!="DELAY HARD"){
  return alert("MEMBER ONLY DELAY")
 }

 let t=document.getElementById("terminal")
 t.innerHTML+="> RUNNING...<br>"
 sound(900)
}

// KEY SYSTEM
function getKeys(){
 return JSON.parse(localStorage.getItem("vipKeys")||"[]")
}
function saveKeys(d){
 localStorage.setItem("vipKeys",JSON.stringify(d))
}

function buatKey(){
 let key=newKey.value.trim()
 let dur=durasi.value

 if(!key) return alert("ISI KEY")

 let data=getKeys()
 if(data.find(x=>x.key==key)){
  return alert("KEY SUDAH ADA")
 }

 let exp = dur=="perm" ? "PERMANEN" : Date.now()+dur*86400000

 data.push({key:key,exp:exp})
 saveKeys(data)

 hasilKey.innerHTML="KEY: "+key
 newKey.value=""
}

// DIGITAL
function order(){
 window.open("https://wa.me/6282164453311?text=ORDER")
}
function go(x){window.open(x)}

// LOGOUT
function logout(){
 location.reload()
}

</script>

</body>
</html>
