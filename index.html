<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rverx</title>

<style>
body{
 margin:0;
 background:black;
 color:#00ffcc;
 font-family:monospace;
 overflow:hidden;
}

/* MATRIX */
canvas{
 position:fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 z-index:-1;
}

/* LOGO */
.logo{
 width:100px;
 display:block;
 margin:10px auto;
 filter:drop-shadow(0 0 10px #00ffcc);
}

/* BOX */
.box{
 background:rgba(0,0,0,0.8);
 border:1px solid #00ffcc;
 margin:10px;
 padding:15px;
 border-radius:10px;
 text-align:center;
}

/* INPUT */
input,select{
 width:90%;
 padding:10px;
 margin:5px;
 background:black;
 border:1px solid #00ffcc;
 color:#00ffcc;
}

/* BUTTON */
.row{display:flex;gap:10px}
button{
 flex:1;
 padding:10px;
 background:#00ffcc;
 border:none;
 color:black;
 font-weight:bold;
}

/* TERMINAL */
#terminal{
 height:150px;
 overflow:auto;
 text-align:left;
 font-size:12px;
 margin-top:10px;
 border-top:1px solid #00ffcc;
 padding-top:5px;
}

/* PROGRESS */
.bar{
 height:6px;
 background:#111;
 margin-top:10px;
}
.fill{
 height:100%;
 width:0%;
 background:#00ffcc;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="login">
<img src="https://files.catbox.moe/bi2bn4.png" class="logo">

<div class="box">
<input id="user" placeholder="USERNAME">
<input id="pass" placeholder="PASSWORD">

<div class="row">
<button onclick="window.close()">KEMBALI</button>
<button onclick="login()">BERIKUTNYA</button>
</div>
</div>
</div>

<div id="menu" style="display:none">
<img src="https://files.catbox.moe/bi2bn4.png" class="logo">

<div class="box">
<input id="number" placeholder="62XXXXXXXXX">

<select id="bugType">
<option>FORCE CLOSE</option>
<option>DELAY HARD</option>
<option>BLANK UI</option>
<option>ATTACK IOS</option>
</select>

<div class="row">
<button onclick="resetForm()">BATALKAN</button>
<button onclick="startSim()">KONFIRMASI</button>
</div>

<div class="bar"><div class="fill" id="fill"></div></div>

<div id="terminal"></div>

</div>
</div>

<script>

// MATRIX EFFECT
let c = document.getElementById("matrix")
let ctx = c.getContext("2d")
c.height = window.innerHeight
c.width = window.innerWidth

let letters = "01RVERX".split("")
let drops = Array(Math.floor(c.width/10)).fill(1)

function draw(){
 ctx.fillStyle="rgba(0,0,0,0.05)"
 ctx.fillRect(0,0,c.width,c.height)
 ctx.fillStyle="#0f0"
 ctx.font="10px monospace"

 drops.forEach((y,i)=>{
  let text=letters[Math.floor(Math.random()*letters.length)]
  ctx.fillText(text,i*10,y*10)
  if(y*10>c.height && Math.random()>0.95) drops[i]=0
  drops[i]++
 })
}
setInterval(draw,50)

// SOUND
function beep(){
 let ctx=new (AudioContext||webkitAudioContext)()
 let o=ctx.createOscillator()
 o.connect(ctx.destination)
 o.start()
 setTimeout(()=>o.stop(),80)
}

// VIBRATE
function vib(x){
 if(navigator.vibrate) navigator.vibrate(x)
}

// LOGIN
function login(){
 beep(); vib(50)
 if(user.value && pass.value){
  login.style.display="none"
  menu.style.display="block"
 }
}

// TERMINAL PRINT
function log(t){
 let term=document.getElementById("terminal")
 term.innerHTML += "> "+t+"<br>"
 term.scrollTop=term.scrollHeight
}

// RESET
function resetForm(){
 number.value=""
 terminal.innerHTML=""
 fill.style.width="0%"
}

// START SIM
function startSim(){
 let num=number.value
 let type=bugType.value

 if(!num) return alert("Nomor kosong")

 log("Initializing Rverx Engine...")
 vib([100,50,100])

 // 📍 HUBUNGKAN case.js DI SINI
 if(typeof sendBug === "function"){
  sendBug(num, type)
 }

 let p=0
 let i=setInterval(()=>{
  p+=10
  fill.style.width=p+"%"

  log("Processing "+p+"% ...")

  if(p>=100){
   clearInterval(i)
   vib(200)
   log("TARGET : "+num)
   log("TYPE   : "+type)
   log("STATUS : SUCCESS (SIMULASI)")
  }

 },300)
}

</script>

<script src="Rverx.js"></script>

</body>
  </html>
