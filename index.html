<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rverx</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:black;
 color:white;
 overflow:hidden;
}

/* BG */
.bg{
 position:fixed;
 width:100%;
 height:100%;
 object-fit:cover;
 filter:blur(6px) brightness(0.35);
 z-index:-3;
}

/* INTRO */
#intro{
 position:fixed;
 width:100%;
 height:100%;
 z-index:999;
}
#intro video{
 width:100%;
 height:100%;
 object-fit:cover;
 pointer-events:none;
}
#skip{
 position:absolute;
 top:10px;
 right:10px;
 padding:5px 10px;
 font-size:11px;
 background:rgba(0,0,0,0.3);
 color:white;
 border:none;
 border-radius:8px;
 z-index:1000;
}

/* LOGO */
.logo{
 width:90px;
 height:90px;
 border-radius:50%;
 display:block;
 margin:15px auto;
 box-shadow:0 0 25px cyan;
}

/* BOX */
.box{
 background:rgba(0,0,0,0.45);
 backdrop-filter:blur(15px);
 margin:10px;
 padding:15px;
 border-radius:15px;
}

/* INPUT */
input,select,textarea{
 width:100%;
 padding:10px;
 margin:5px 0;
 border:none;
 border-radius:10px;
 background:#111;
 color:white;
}

/* BUTTON */
button{
 width:100%;
 padding:10px;
 margin:5px 0;
 border:none;
 border-radius:10px;
 background:linear-gradient(45deg,#00f0ff,#0066ff);
 color:white;
}

/* NAV */
.nav{
 position:fixed;
 bottom:0;
 width:100%;
 display:none;
 justify-content:space-around;
 background:rgba(0,0,0,0.7);
}
.nav button{font-size:11px}

/* PAGE */
.page{display:none}
.active{display:block}

/* LIST */
.list{max-height:50vh;overflow:auto}
.item{
 padding:8px;
 margin:5px;
 background:#111;
 border-radius:10px;
}

/* NOTIF */
#notif{
 position:fixed;
 bottom:90px;
 left:50%;
 transform:translateX(-50%);
 background:#000;
 padding:12px;
 border-radius:10px;
 border:1px solid cyan;
 display:none;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<video src="https://files.catbox.moe/iw29ox.mp4" autoplay muted playsinline></video>
<button id="skip">SKIP</button>
</div>

<!-- BG -->
<video class="bg" src="https://files.catbox.moe/lnj4we.mp4" autoplay loop muted></video>

<!-- LOGIN -->
<div id="login" class="page">
<img src="https://files.catbox.moe/bi2bn4.png" class="logo">
<div class="box">
<input id="user" placeholder="USERNAME / KEY">
<input id="pass" placeholder="PASSWORD">
<button onclick="login()">LOGIN</button>
</div>
</div>

<!-- MAIN -->
<div id="main" class="page">

<img src="https://files.catbox.moe/bi2bn4.png" class="logo">

<div id="type" class="box">
<input id="number" placeholder="62XXXXXXXX">
<select id="bugType">
<option value="DELAY HARD">DELAY HARD</option>
<option value="FORCE CLOSE">FORCE CLOSE</option>
<option value="BLANK UI">BLANK UI</option>
<option value="ATTACK IOS">ATTACK IOS</option>
</select>
<button onclick="run()">KONFIRMASI</button>
</div>

</div>

<div class="nav">
<button onclick="logout()">LOGOUT</button>
</div>

<div id="notif"></div>

<script>

/* FIX INTRO */
document.getElementById("skip").onclick = startApp

function startApp(){
 let intro = document.getElementById("intro")
 intro.remove() // 🔥 ini fix utama

 let login = document.getElementById("login")
 login.classList.add("active")
}

/* LOGIN */
let role="guest"
let keys=JSON.parse(localStorage.getItem("keys")||"{}")

function login(){

 let u = document.getElementById("user").value
 let p = document.getElementById("pass").value

 if(u==="YanzzMEMBER" && p==="12345678"){
  role="member"
 }
 else if(u==="YanzzOWNER" && p==="27051210#$+-"){
  role="admin"
 }
 else if(keys[u]){
  if(Date.now()>keys[u].exp) return alert("Key expired")
  role="prem"
 }
 else{
  alert("Login gagal")
  return
 }

 document.getElementById("login").classList.remove("active")
 document.getElementById("main").classList.add("active")
 document.querySelector(".nav").style.display="flex"
}

/* SIMULASI */
function run(){
 let num=document.getElementById("number").value
 let type=document.getElementById("bugType").value

 let notif=document.getElementById("notif")
 notif.style.display="block"

 notif.innerHTML=`TARGET: ${num}<br>TYPE: ${type}<br>STATUS: LOADING...`

 setTimeout(()=>{
  notif.innerHTML+=`<br>STATUS: SUCCESS`
 },1500)

 // 🔥 HUBUNGKAN KE Rverx.js
 if(typeof sendBug==="function"){
  sendBug(num,type)
 }
}

/* LOGOUT */
function logout(){
 location.reload()
}

</script>

<!-- 🔥 TARUH CASE / Rverx.js DI SINI -->
<script src="Rverx.js"></script>

</body>
</html>
