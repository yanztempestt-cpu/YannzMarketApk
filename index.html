.bg-gradient {

    left: 0;

}
.bg-scan {
    position: fixed;

    animation: pulseGlow 4s infinite;
}
.floating-particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}
.particle {
    position: absolute;
    background: rgba(0, 255, 255, 0.2);
    border-radius: 50%;

}
@keyframes float {
    0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }

    z-index: 10;
}
.page:not(.active) {
    transform: translateX(100%) scale(0.96);
    opacity: 0;
    pointer-events: none;
}
.page.active {
    transform: translateX(0) scale(1);
    opacity: 1;
    pointer-events: auto;
}

// GENERATE KEY (SEKALI PAKAI + EXPIRED)
function generateKey() {
    let newKeyVal = document.getElementById("newKey").value.trim();
    let durasiVal = parseInt(document.getElementById("durasi").value);
    if(!newKeyVal) { alert("Masukkan key string!"); return; }
    if(keys[newKeyVal]) { alert("Key sudah ada!"); return; }
    let expTime = Date.now() + (durasiVal * 86400000);
    keys[newKeyVal] = { 
        exp: expTime,
        used: false,
        created: Date.now()
    };
    localStorage.setItem("keys", JSON.stringify(keys));
    let durasiTeks = durasiVal === 9999 ? "PERMANEN" : durasiVal + " Hari";
    alert(`🔑 KEY "${newKeyVal}" BERHASIL!\nDurasi: ${durasiTeks}\nHanya bisa dipakai 1x!`);
    document.getElementById("newKey").value = "";
    showNotif("Key baru siap (sekali pakai)!", 1500);
}

function logout() { 
    localStorage.clear(); 
    location.reload(); 
}
function showNotif(msg, duration) {
    let n = document.getElementById("notif");
    if(!n) return;
    n.innerHTML = msg;
    n.style.display = "block";
    setTimeout(() => { if(n) n.style.display = "none"; }, duration);
}

// FLOATING PARTICLES
function createParticles() {
    const container = document.getElementById("particles");
    for(let i=0;i<40;i++) {
        let p = document.createElement("div");
        p.className = "particle";
        let size = Math.random() * 6 + 2;
        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.left = Math.random() * 100 + "%";
        p.style.top = Math.random() * 100 + "%";
        p.style.animationDuration = Math.random() * 12 + 5 + "s";
        p.style.animationDelay = Math.random() * 5 + "s";
        container.appendChild(p);
    }
}
createParticles();
