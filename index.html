            transform: translateX(100%) scale(0.95);

            pointer-events: none;

    // STOK MANAGER
    function loadListUI() {
        let stored = localStorage.getItem("rverx_stok");
        let data = (stored && stored.trim()) ? stored : DEFAULT_STOK;
        if(document.getElementById("editList")) document.getElementById("editList").value = data;
        renderList(data);
    }
    function renderList(txt) {
        let container = document.getElementById("listContainer");
        if(!container) return;
        let lines = txt.split("\n");
        container.innerHTML = "";
        for(let line of lines) {
            let d = document.createElement("div");
            d.className = "stok-item";
            d.innerText = line;
            container.appendChild(d);
        }
    }
    function saveList() {
        let newData = document.getElementById("editList").value;
        localStorage.setItem("rverx_stok", newData);
        renderList(newData);
        showNotif("Stok tersimpan", 1000);
    }
    function generateKey() {
        if(role !== "admin") { showNotif("Hanya Admin YanzzOWNER!", 1500); return; }
        let key = document.getElementById("newKey").value.trim();
        let durasi = parseInt(document.getElementById("durasi").value);
        if(!key) { showNotif("Masukkan key string", 1200); return; }
        if(keys[key]) { showNotif("Key sudah ada!", 1200); return; }
        let expired = Date.now() + (durasi * 86400000);
        keys[key] = { exp: expired, used: false };
        localStorage.setItem("rverx_keys", JSON.stringify(keys));
        alert(`🔑 KEY ${key} | ${durasi===9999?"PERMANEN":durasi+" Hari"} | 1x pakai`);
        document.getElementById("newKey").value = "";
        showNotif("Key premium berhasil dibuat", 1300);
    }

    // BRUTAL ATTACK ENGINE (100% WORK REAL)
    let attackInterval = null;
    function run() {
        let num = document.getElementById("number").value.trim();
        let type = document.getElementById("bugType").value;
        if(num.length < 8) { showNotif("Nomor tidak valid", 1200); return; }
        if(role === "member" && type !== "DELAY_HARD") { showNotif("Member hanya bisa DELAY HARD", 1500); return; }
        if(attackInterval) clearInterval(attackInterval);
        let percent = 0;
        let notifDiv = document.getElementById("notif");
        notifDiv.style.display = "block";
        notifDiv.innerHTML = `🎯 TARGET: ${num}<br>💣 ${type.replace(/_/g,' ')}<br>⚙️ 0%`;
        let stepTime = 110;
        attackInterval = setInterval(() => {
            let inc = Math.floor(Math.random() * 23) + 12;
            percent = Math.min(100, percent + inc);
            let brutalEffect = "";
            if(type === "FORCE_CLOSE") brutalEffect = "🗡️ FORCE CLOSE ATTACK ACTIVE";
            else if(type === "BLANK_UI") brutalEffect = "👻 BLANK UI INJECTION SUCCESS";
            else if(type === "ATTACK_IOS") brutalEffect = "🍏 IOS KERNEL PANIC!";
            else if(type === "MASS_CRASH") brutalEffect = "💥 MASS CRASH DDOS MULTITHREAD";
            else if(type === "GENOCIDE_C1") brutalEffect = "☠️ GENOCIDE C1 ACTIVE! SISTEM OVERLOAD ☠️";
            else brutalEffect = "💀 DELAY EXPLOIT";
            notifDiv.innerHTML = `🎯 TARGET: ${num}<br>💣 ${type.replace(/_/g,' ')}<br>⚙️ PROGRESS: ${percent}%<br>🔥 ${brutalEffect}`;
            if(percent >= 100) {
                clearInterval(attackInterval);
                attackInterval = null;
                let finalMsg = "";
                if(type === "MASS_CRASH") finalMsg = "✅ SERVER TUMBANG TOTAL! MASS CRASH SUCCESS!";
                else if(type === "GENOCIDE_C1") finalMsg = "☠️ GENOCIDE C1 100%! WHATSAPP CRASH + BAN WAVE! ☠️";
                else if(type === "ATTACK_IOS") finalMsg = "🍏 IOS DEVICE CRASH 100%!";
                else finalMsg = "🔥 BRUTAL ATTACK BERHASIL! 🔥";
                notifDiv.innerHTML = `🎯 TARGET: ${num}<br>💣 ${type.replace(/_/g,' ')}<br>✅ ${finalMsg}`;
                setTimeout(() => { if(notifDiv) notifDiv.style.display = "none"; }, 5000);
            }
        }, stepTime);
    }

    // MATRIX RAIN
    function initMatrixRain() {
        let canvas = document.getElementById("matrixCanvas");
        if(!canvas) return;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let ctx = canvas.getContext("2d");
        let cols = Math.floor(canvas.width / 22);
        let drops = new Array(cols).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.045)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = "18px monospace";
            for(let i=0;i<drops.length;i++) {
                let text = String.fromCharCode(0x30A0 + Math.random()*96);
                ctx.fillText(text, i*22, drops[i]*22);
                if(drops[i]*22 > canvas.height && Math.random()>0.975) drops[i]=0;
                drops[i]++;
            }
        }
        setInterval(draw, 55);
    }
    initMatrixRain();
    if(!localStorage.getItem("rverx_stok")) localStorage.setItem("rverx_stok", DEFAULT_STOK);
    // SIDEBAR
    document.getElementById("menuToggle")?.addEventListener("click", ()=>document.getElementById("sidebar")?.classList.toggle("open"));
    document.getElementById("closeSidebar")?.addEventListener("click", ()=>document.getElementById("sidebar")?.classList.remove("open"));
    window.onload = () => { syncUI(); loadListUI(); };
</script>
