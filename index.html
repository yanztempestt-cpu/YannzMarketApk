<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YANNZ STORE ⚓</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 color:white;
 background:linear-gradient(180deg,#0f0c29,#302b63,#24243e);
}

.page{display:none;padding:20px;height:90vh;overflow:auto;}
.active{display:block;}

h2{text-align:center;text-shadow:0 0 10px purple;}

input,button{
 width:90%;
 padding:10px;
 margin:5px;
 border:none;
 border-radius:10px;
}

button{
 background:linear-gradient(45deg,#7b00ff,#00c3ff);
 color:white;
}

.card{
 background:rgba(255,255,255,0.08);
 padding:15px;
 margin:10px 0;
 border-radius:12px;
}

.item{
 padding:10px;
 border-bottom:1px solid rgba(255,255,255,0.1);
 cursor:pointer;
}
.item:hover{background:rgba(255,255,255,0.1);}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page active">
<h2>LOGIN 🔒</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">MASUK</button>
<button onclick="showPage('register')">DAFTAR</button>
</div>

<!-- REGISTER -->
<div id="register" class="page">
<h2>DAFTAR</h2>
<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">DAFTAR</button>
<button onclick="showPage('login')">KEMBALI</button>
</div>

<!-- GATE -->
<div id="gate" class="page">
<h2>MENU ⚓</h2>
<h3 id="welcomeUser"></h3>

<div class="card">
<button onclick="joinChannel()">JOIN SALURAN</button>
<button onclick="joinGroup()">JOIN GRUB</button>
<button onclick="window.open('https://www.instagram.com/yanzzzmarket?igsh=MTZiajloaWFjenhjdQ==')">FOLLOW IG</button>
<button onclick="window.open('https://youtube.com/@king_of_file?si=Y2JW5MF14IJ3QtyD')">SUBSCRIBE YT</button>
</div>

<div class="card">
<button onclick="showReward()">🎁 REWARD</button>
<button onclick="showHistory()">📦 RIWAYAT</button>
<button onclick="topup()">💰 TOP UP</button>
</div>

<div class="card">
<button onclick="showPage('list')">📋 OPEN LIST</button>
</div>

<button onclick="logout()">LOGOUT</button>
</div>

<!-- LIST -->
<div id="list" class="page">
<h2>OPEN LIST</h2>

<div class="card">

<h3>KEBUTUHAN BY YANZZ</h3>
<div class="item" onclick="order('BAYAR PLN')">BAYAR PLN</div>
<div class="item" onclick="order('SUNTIK SOSMED')">SUNTIK SOSMED</div>
<div class="item" onclick="order('NOKOS')">NOKOS</div>
<div class="item" onclick="order('TOP UP GAME')">TOP UP GAME</div>

<hr>

<pre style="white-space:pre-wrap;font-size:12px;">
WTS KEBUTUHAN DIGITAL BY YANNZ⚓
(Full list tersedia, klik item di atas untuk order cepat)
</pre>

</div>

<button onclick="showPage('gate')">KEMBALI</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2>ADMIN PANEL</h2>

<input id="userTarget" placeholder="Username">
<input id="saldoTambah" placeholder="Tambah saldo">
<button onclick="addSaldo()">Tambah Saldo</button>

<button onclick="lihatUser()">Lihat User</button>
<button onclick="lihatSemuaRiwayat()">Lihat Transaksi</button>

<input id="rewardInput" placeholder="Edit reward">
<button onclick="saveReward()">Simpan Reward</button>

<button onclick="logout()">LOGOUT</button>
</div>

<!-- POPUP -->
<div id="popup" style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:#111;padding:20px;border-radius:10px;z-index:999;">
<div id="popupContent"></div>
<br>
<button onclick="closePopup()">Tutup</button>
</div>

<script>

// ===== DATA =====
let users = JSON.parse(localStorage.getItem("users")||"[]");

// ===== REGISTER =====
function register(){
 let u = val("regUser");
 let p = val("regPass");

 users.push({user:u,pass:p,saldo:10000,history:[]});
 localStorage.setItem("users",JSON.stringify(users));
 alert("Berhasil daftar!");
 showPage("login");
}

// ===== LOGIN =====
function login(){
 let u = val("user");
 let p = val("pass");

 if(u==="OWNER_YANZZ" && p==="27051210#$+-"){
  localStorage.setItem("role","admin");
  showPage("admin");
  return;
 }

 let acc = users.find(x=>x.user===u && x.pass===p);

 if(acc){
  localStorage.setItem("loginUser",u);
  localStorage.setItem("role","user");
  showPage("gate");
  loadUser();
 }else alert("Salah!");
}

// ===== SESSION =====
window.onload=function(){
 let role=localStorage.getItem("role");

 if(role==="admin") showPage("admin");
 else if(role==="user"){showPage("gate");loadUser();}
 else showPage("login");
}

// ===== USER LOAD =====
function loadUser(){
 let u=localStorage.getItem("loginUser");
 let acc=users.find(x=>x.user===u);

 document.getElementById("welcomeUser").innerText =
 "👤 "+u+" | 💰 "+acc.saldo;
}

// ===== NAV =====
function showPage(id){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// ===== LOGOUT =====
function logout(){
 localStorage.clear();
 location.reload();
}

// ===== JOIN =====
function joinChannel(){
 window.open("https://whatsapp.com/channel/0029VbCWWN96rsQsfLC0B71f");
}
function joinGroup(){
 window.open("https://chat.whatsapp.com/HZJVWkSLsECBV7f1S4FpxN?mode=gi_t");
}

// ===== ORDER =====
function order(name){
 let u=localStorage.getItem("loginUser");
 let acc=users.find(x=>x.user===u);

 let pilih=confirm("OK = saldo\nCancel = WA");

 if(pilih){
  if(acc.saldo>=5000){
   acc.saldo-=5000;
   acc.history.push(name);
   localStorage.setItem("users",JSON.stringify(users));
   loadUser();
   alert("Berhasil beli!");
  }else alert("Saldo kurang!");
 }else{
  window.open("https://wa.me/6282164463311?text="+encodeURIComponent("Halo BG saya mau beli "+name));
 }
}

// ===== RIWAYAT =====
function showHistory(){
 let u=localStorage.getItem("loginUser");
 let acc=users.find(x=>x.user===u);

 openPopup(acc.history.join("\n")||"Kosong");
}

// ===== POPUP =====
function openPopup(t){
 document.getElementById("popupContent").innerText=t;
 document.getElementById("popup").style.display="block";
}
function closePopup(){
 document.getElementById("popup").style.display="none";
}

// ===== TOPUP =====
function topup(){
 let j=prompt("Jumlah:");
 let u=localStorage.getItem("loginUser");
 let acc=users.find(x=>x.user===u);

 acc.saldo+=parseInt(j);
 localStorage.setItem("users",JSON.stringify(users));
 loadUser();
}

// ===== ADMIN =====
function addSaldo(){
 let target=val("userTarget");
 let jumlah=parseInt(val("saldoTambah"));

 let acc=users.find(x=>x.user===target);
 if(acc){
  acc.saldo+=jumlah;
  localStorage.setItem("users",JSON.stringify(users));
  alert("Berhasil!");
 }
}

function lihatUser(){
 alert(users.map(u=>u.user+" | "+u.saldo).join("\n"));
}

function lihatSemuaRiwayat(){
 let t="";
 users.forEach(u=>{
  t+="\n"+u.user+"\n"+u.history.join("\n");
 });
 alert(t);
}

// ===== REWARD =====
let rewardText=localStorage.getItem("reward")||"Belum ada";
function showReward(){alert(rewardText);}
function saveReward(){
 rewardText=val("rewardInput");
 localStorage.setItem("reward",rewardText);
}

// ===== HELPER =====
function val(id){return document.getElementById(id).value}

</script>

</body>
</html>
