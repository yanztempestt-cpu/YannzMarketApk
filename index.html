<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YanzzAI Builder</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:white;
}

.container {
  padding:20px;
}

input, button, textarea {
  width:100%;
  margin:10px 0;
  padding:10px;
  border:none;
  border-radius:5px;
}

button {
  background:#00ffcc;
  color:black;
  font-weight:bold;
}

#editorPage {display:none;}

#preview {
  background:white;
  color:black;
  padding:10px;
  margin-top:10px;
}
</style>

</head>
<body>

<div class="container" id="loginPage">
  <h2>Login YanzzAI ⚓</h2>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">LOGIN</button>
</div>

<div class="container" id="editorPage">
  <h2>YanzzAI Web Builder</h2>

  <textarea id="htmlInput" rows="10" placeholder="Masukkan HTML kamu disini..."></textarea>

  <button onclick="updatePreview()">Tampilkan</button>
  <button onclick="saveData()">Simpan</button>
  <button onclick="copyCode()">Salin Code</button>

  <h3>Preview:</h3>
  <div id="preview"></div>
</div>

<script>
const USER = "Yanzz_OWNER";
const PASS = "27051210#$+-";

// login
function login(){
  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  if(u === USER && p === PASS){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("editorPage").style.display = "block";

    loadData();
  } else {
    alert("Login salah!");
  }
}

// tampilkan preview
function updatePreview(){
  let code = document.getElementById("htmlInput").value;
  document.getElementById("preview").innerHTML = code;
}

// simpan ke browser
function saveData(){
  let code = document.getElementById("htmlInput").value;
  localStorage.setItem("yanzz_html", code);
  alert("Tersimpan!");
}

// load data
function loadData(){
  let data = localStorage.getItem("yanzz_html");
  if(data){
    document.getElementById("htmlInput").value = data;
    document.getElementById("preview").innerHTML = data;
  }
}

// copy code
function copyCode(){
  let text = document.getElementById("htmlInput");
  text.select();
  document.execCommand("copy");
  alert("Code disalin!");
}
</script>

</body>
  </html>
