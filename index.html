<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #05050A;
    font-family: 'Inter', 'Poppins', system-ui, -apple-system, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    position: fixed;
}

/* PREMIUM DARK GLOW */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(20px) brightness(0.2);
    z-index: -2;
}

/* ========== PAGE SYSTEM (NO SCROLL, PINDH HALAMAN) ========== */
.page {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
    transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.25s;
    background: rgba(8, 8, 16, 0.85);
    backdrop-filter: blur(8px);
    z-index: 10;
}

.page:not(.active) {
    transform: translateX(100%);
    opacity: 0;
    pointer-events: none;
    display: block;
}

.page.active {
    transform: translateX(0);
    opacity: 1;
    pointer-events: auto;
}

/* HIDE SCROLLBAR */
.page::-webkit-scrollbar {
    width: 0;
    background: transparent;
}

/* LOGO GLOW */
.logo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    display: block;
    margin: 20px auto 15px;
    box-shadow: 0 0 30px cyan, 0 0 10px rgba(0,255,255,0.6);
    border: 2px solid rgba(255,255,255,0.3);
}

/* GLASS CARD */
.box {
    background: rgba(12, 12, 24, 0.75);
    backdrop-filter: blur(20px);
    border-radius: 32px;
    margin: 16px;
    padding: 22px 20px;
    border: 1px solid rgba(0, 255, 255, 0.3);
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}

.video-box video {
    width: 100%;
    border-radius: 24px;
    margin-bottom: 18px;
    border: 1px solid cyan;
    box-shadow: 0 0 12px rgba(0,255,255,0.3);
}

/* INPUT PREMIUM */
input, select, textarea {
    width: 100%;
    padding: 16px 18px;
    margin: 12px 0;
    border: none;
    border-radius: 32px;
    background: #0C0C14;
    color: white;
    font-size: 15px;
    outline: none;
    border: 1px solid #2a2a3a;
    transition: 0.2s;
}
input:focus, select:focus {
    border-color: cyan;
    box-shadow: 0 0 12px cyan;
    background: #0a0a12;
}

/* BUTTON GLOW */
button {
    width: 100%;
    padding: 16px;
    margin: 10px 0;
    border: none;
    border-radius: 48px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: 0.12s linear;
    letter-spacing: 1px;
}
button:active {
    transform: scale(0.96);
}
.row {
    display: flex;
    gap: 12px;
}
.row button {
    flex: 1;
}
.row button:first-child {
    background: #2c2c3e;
}
.row button:last-child {
    background: linear-gradient(135deg, #00f2fe, #4facfe);
}

/* NAV BOTTOM GLASS */
.nav {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    display: flex;
    justify-content: space-around;
    background: rgba(10, 10, 20, 0.9);
    backdrop-filter: blur(24px);
    padding: 12px 20px;
    border-radius: 60px;
    border: 1px solid rgba(0,255,255,0.4);
    z-index: 100;
    gap: 8px;
}
.nav button {
    width: auto;
    margin: 0;
    padding: 10px 18px;
    font-size: 13px;
    background: #1a1a2a;
    border-radius: 40px;
    font-weight: 600;
}
.nav button:active {
    transform: scale(0.95);
}

/* LIST STOK PREMIUM */
.list-container {
    max-height: 55vh;
    overflow-y: auto;
    padding: 5px;
}
.list-item {
    background: rgba(15, 15, 25, 0.8);
    backdrop-filter: blur(8px);
    margin: 12px 0;
    padding: 16px 18px;
    border-radius: 28px;
    border-left: 5px solid cyan;
    font-size: 13px;
    font-family: monospace;
    white-space: pre-wrap;
    word-break: break-word;
    color: #ddd;
    line-height: 1.5;
}

/* CHAT BUTTON PREMIUM */
.chat-now {
    background: linear-gradient(135deg, #25D366, #128C7E);
    margin-top: 10px;
    box-shadow: 0 4px 15px rgba(37,211,102,0.4);
}
.chat-now:active {
    transform: scale(0.96);
}

/* NOTIF */
#notif {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: #000000dd;
    backdrop-filter: blur(20px);
    padding: 14px 28px;
    border-radius: 60px;
    border: 1px solid cyan;
    display: none;
    z-index: 200;
    font-size: 14px;
    font-weight: bold;
    text-align: center;
    min-width: 220px;
    color: #0ff;
    pointer-events: none;
}

/* INTRO */
#intro {

    width: 100%;
    height: 100%;
    z-index: 1000;
    background: #000;
    transition: opacity 0.4s;
}
#intro video {

    height: 100%;

}
#skip {
    position: absolute;
    bottom: 40px;
    right: 20px;
    padding: 12px 28px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(12px);
    border-radius: 40px;
    color: white;
    border: 1px solid cyan;
    width: auto;
}
</style>

<script>

const skipBtn = document.getElementById("skip");
const introVid = document.getElementById("introVid");

    introDiv.style.opacity = "0";
    setTimeout(() => {
        if(introDiv && introDiv.parentNode) introDiv.remove();
        document.getElementById("page-login").classList.add("active");

}
skipBtn.addEventListener("click", forceSkipIntro);
if(introVid) introVid.addEventListener("ended", forceSkipIntro);

// STORAGE
let role = "guest";
let keys = {};
try { keys = JSON.parse(localStorage.getItem("keys")||"{}"); } catch(e) { keys = {}; }

const defaultStok = `*_⚓STOK YANZZ⚓_*
*_⚓PANEL FF⚓_*
- DRIP CLINET 10K NO VIP

- EASY DRAG 90% 40K

- HEADLOCK 98% 50K

- DPT PANEL WEB NOKOS

____________________________________________

-NOKOS VVIP 10K
-JASBUG 5K

// DOM Elements
const loginPage = document.getElementById("page-login");
const mainPage = document.getElementById("page-main");
const listPage = document.getElementById("page-list");
const digitalPage = document.getElementById("page-digital");
const keygenPage = document.getElementById("page-keygen");
const navDiv = document.getElementById("mainNav");
const keyNavBtn = document.getElementById("keyNavBtn");
const editListArea = document.getElementById("editList");
const saveListBtn = document.getElementById("saveBtn");
const listContainer = document.getElementById("listContainer");

// SWITCH PAGE FUNCTION (tanpa scroll, pindah halaman)
function switchPage(pageName) {
    // Sembunyikan semua page
    const pages = ['login', 'main', 'list', 'digital', 'keygen'];
    pages.forEach(p => {
        const el = document.getElementById(`page-${p}`);
        if(el) el.classList.remove('active');
    });
    // Tampilkan page yang dipilih
    const activePage = document.getElementById(`page-${pageName}`);
    if(activePage) activePage.classList.add('active');
}

function login() {
    let u = document.getElementById("user").value.trim();
    let p = document.getElementById("pass").value;
    role = "guest";

    if(keys[u]) {
        if(Date.now() > keys[u].exp) { alert("⚠️ KEY EXPIRED!"); return; }
        role = "prem";
    }
    else if(u === "YanzzOWNER" && p === "27051210#$+-") {
        role = "admin";
        keyNavBtn.style.display = "block";
        if(editListArea) editListArea.style.display = "block";
        if(saveListBtn) saveListBtn.style.display = "block";
    }
    else if(u === "YanzzMEMBER" && p === "12345678") {
        role = "member";
    }
    else {
        alert("❌ LOGIN GAGAL! Cek Key/Username");
        return;
    }

    // Pindah ke halaman utama
    switchPage('main');
    navDiv.style.display = "flex";
    applyRoleBugs();
    loadListUI();
    showNotif(`✅ LOGIN: ${role.toUpperCase()} | RVERX`, 1500);
}

function applyRoleBugs() {
    const bugSelect = document.getElementById("bugType");
    if(!bugSelect) return;
    if(role === "member") {
        for(let opt of bugSelect.options) {
            opt.disabled = (opt.value !== "DELAY HARD");
        }
        bugSelect.value = "DELAY HARD";
    } else {
        for(let opt of bugSelect.options) opt.disabled = false;
    }
}

function loadListUI() {
    let stored = localStorage.getItem("rverx_stok");
    let data = (stored && stored.trim()) ? stored : defaultStok;
    if(editListArea) editListArea.value = data;
    renderList(data);
}
function renderList(text) {
    if(!listContainer) return;
    let lines = text.split("\n");
    listContainer.innerHTML = "";
    for(let line of lines) {
        let div = document.createElement("div");
        div.className = "list-item";
        div.innerText = line;
        listContainer.appendChild(div);
    }
}
function saveList() {
    if(!editListArea) return;
    let newData = editListArea.value;
    localStorage.setItem("rverx_stok", newData);
    renderList(newData);
    showNotif("📁 STOK RVERX DISIMPAN", 1000);
}

function resetForm() {
    document.getElementById("number").value = "";
    showNotif("⭕ FORM RESET", 700);
}

let currentInterval = null;
function run() {
    let num = document.getElementById("number").value.trim();
    let typeSelect = document.getElementById("bugType");
    let type = typeSelect.value;
    if(!num || num.length < 8) {
        showNotif("⚠️ MASUKAN NOMOR VALID (62xxx)", 1500);
        return;
    }
    if(role === "member") type = "DELAY HARD";
    const notifDiv = document.getElementById("notif");
    notifDiv.style.display = "block";
    if(currentInterval) clearInterval(currentInterval);
    let percent = 0;
    notifDiv.innerHTML = `🎯 TARGET: ${num}<br>💣 TYPE: ${type}<br>⚙️ PROGRESS: 0%`;
    currentInterval = setInterval(() => {
        percent += Math.floor(Math.random() * 18) + 4;
        if(percent >= 100) {
            percent = 100;
            clearInterval(currentInterval);
            currentInterval = null;
            notifDiv.innerHTML = `✅ TARGET: ${num}<br>🔥 TYPE: ${type}<br>🔻 STATUS: SUCCESS!<br>💀 RVERX BUG ACTIVATED 💀`;
            setTimeout(() => { if(notifDiv) notifDiv.style.display = "none"; }, 3200);
        } else {
            notifDiv.innerHTML = `🎯 TARGET: ${num}<br>💣 TYPE: ${type}<br>⚙️ PROGRESS: ${percent}%`;
        }
    }, 170);
}

// CHAT NOW -> LANGSUNG KE WA TARGET (BUG INTERAKTIF)
function chatNow() {
    let targetNum = document.getElementById("whatsappTarget").value.trim();
    if(!targetNum) {
        showNotif("⚠️ Masukkan nomor target dulu!", 1500);
        return;
    }
    let cleanNum = targetNum.replace(/[^0-9]/g, '');
    if(!cleanNum.startsWith('62')) cleanNum = '62' + cleanNum;
    let waUrl = `https://wa.me/${cleanNum}?text=Halo%20saya%20dari%20Rverx%20Bug%20System`;
    window.open(waUrl, "_blank");
    showNotif("💬 Membuka chat WhatsApp target...", 1200);
}

function orderNow() {
    window.open("https://wa.me/6282164463311?text=Saya%20mau%20order%20bug%20RVERX", "_blank");
}

function generateKey() {
    let newKeyVal = document.getElementById("newKey").value.trim();
    let durasiVal = parseInt(document.getElementById("durasi").value);
    if(!newKeyVal) { alert("Masukkan key!"); return; }
    if(keys[newKeyVal]) { alert("Key sudah ada!"); return; }
    let expTime = Date.now() + (durasiVal * 86400000);
    keys[newKeyVal] = { exp: expTime };
    localStorage.setItem("keys", JSON.stringify(keys));
    alert(`🔑 KEY "${newKeyVal}" BERHASIL! (${durasiVal === 9999 ? "PERMANEN" : durasiVal+" Hari"})`);
    document.getElementById("newKey").value = "";
    showNotif("Key baru siap!", 1200);
}

function openLink(url) { window.open(url, "_blank"); }
function logout() { 
    localStorage.clear();
    location.reload(); 
}
function showNotif(msg, duration) {
    let n = document.getElementById("notif");
    if(!n) return;
    n.innerHTML = msg;
    n.style.display = "block";
    setTimeout(() => { if(n) n.style.display = "none"; }, duration);
}

// INIT STOK
if(!localStorage.getItem("rverx_stok")) localStorage.setItem("rverx_stok", defaultStok);
setTimeout(() => { if(document.getElementById("intro")) forceSkipIntro(); }, 3800);
</script>
