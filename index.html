<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rverx</title>

<style>
body{margin:0;font-family:sans-serif;background:black;color:white;overflow:hidden}

/* BG */
.bg{
 position:fixed;
 width:100%;
 height:100%;
 object-fit:cover;
 filter:blur(8px) brightness(0.35);
 z-index:-2;
}

/* INTRO */
#intro{
 position:fixed;
 width:100%;
 height:100%;
 z-index:999;
}
#intro video{
 width:100%;
 height:100%;
 object-fit:cover;
 pointer-events:none;
}
#skip{
 position:absolute;
 top:10px;
 right:10px;
 padding:5px 10px;
 font-size:11px;
 background:rgba(0,0,0,0.3);
 border-radius:8px;
 color:white;
 border:none;
 z-index:1001;
}

/* LOGO */
.logo{
 width:90px;
 height:90px;
 border-radius:50%;
 display:block;
 margin:10px auto;
 box-shadow:0 0 20px cyan;
}

/* VIDEO BOX */
.vbox video{
 width:100%;
 border-radius:12px;
 margin-bottom:10px;
}

/* BOX */
.box{
 background:rgba(0,0,0,0.5);
 backdrop-filter:blur(15px);
 margin:10px;
 padding:15px;
 border-radius:15px;
}

/* INPUT */
input,select,textarea{
 width:100%;
 padding:10px;
 margin:5px 0;
 border:none;
 border-radius:10px;
 background:#111;
 color:white;
}

/* BUTTON */
button{
 width:100%;
 padding:10px;
 margin:5px 0;
 border:none;
 border-radius:10px;
 background:linear-gradient(45deg,#00f0ff,#0066ff);
 color:white;
}

/* ROW */
.row{display:flex;gap:10px}
.row button{flex:1}

/* NAV */
.nav{
 position:fixed;
 bottom:0;
 width:100%;
 display:none;
 justify-content:space-around;
 background:rgba(0,0,0,0.7);
 backdrop-filter:blur(10px);
}
.nav button{font-size:11px}

/* PAGE */
.page{display:none}
.active{display:block}

/* LIST */
.list{max-height:55vh;overflow:auto}
.item{
 padding:8px;
 margin:5px;
 background:#111;
 border-radius:10px;
}

/* NOTIF */
#notif{
 position:fixed;
 bottom:90px;
 left:50%;
 transform:translateX(-50%);
 background:#000;
 padding:12px;
 border-radius:10px;
 border:1px solid cyan;
 display:none;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<video id="introVid" src="https://files.catbox.moe/iw29ox.mp4" autoplay muted playsinline></video>
<button id="skip">SKIP</button>
</div>

<!-- BG -->
<video class="bg" src="https://files.catbox.moe/lnj4we.mp4" autoplay loop muted></video>

<!-- LOGIN -->
<div id="login" class="page">
<img src="https://files.catbox.moe/bi2bn4.png" class="logo">

<div class="box vbox">
<video autoplay muted loop>
<source src="https://files.catbox.moe/lnj4we.mp4">
</video>

<input id="user" placeholder="USERNAME / KEY">
<input id="pass" placeholder="PASSWORD">

<button onclick="login()">LOGIN</button>
</div>
</div>

<!-- MAIN -->
<div id="main" class="page">

<img class="logo" src="https://files.catbox.moe/bi2bn4.png">

<!-- TYPE -->
<div id="type" class="box vbox">
<video autoplay muted loop>
<source src="https://files.catbox.moe/lnj4we.mp4">
</video>

<input id="number" placeholder="62XXXXXXXX">

<select id="bugType">
<option value="DELAY HARD">DELAY HARD</option>
<option value="FORCE CLOSE">FORCE CLOSE</option>
<option value="BLANK UI">BLANK UI</option>
<option value="ATTACK IOS">ATTACK IOS</option>
</select>

<div class="row">
<button onclick="resetForm()">BATALKAN</button>
<button onclick="run()">KONFIRMASI</button>
</div>
</div>

<!-- LIST -->
<div id="list" class="box" style="display:none">
<textarea id="editList" style="display:none"></textarea>
<div id="listContainer" class="list"></div>
<button id="saveBtn" onclick="saveList()" style="display:none">SAVE LIST</button>
</div>

<!-- DIGITAL -->
<div id="digital" class="box" style="display:none">
<button onclick="openLink('https://chat.whatsapp.com/HZJVWkSLsECBV7f1S4FpxN')">JOIN FJB</button>
<button onclick="openLink('https://whatsapp.com/channel/0029VbCWWN96rsQsfLC0B71f')">SALURAN</button>
<button onclick="openLink('https://www.instagram.com/yanzzzmarket')">INSTAGRAM</button>
<button onclick="openLink('https://youtube.com/@king_of_file')">YOUTUBE</button>
<button onclick="wa()">ORDER</button>
</div>

<!-- KEY -->
<div id="key" class="box" style="display:none">
<input id="newKey" placeholder="MASUKAN KEY">
<select id="durasi">
<option value="1">1 HARI</option>
<option value="3">3 HARI</option>
<option value="7">7 HARI</option>
<option value="30">1 BULAN</option>
<option value="9999">PERMANEN</option>
</select>
<button onclick="generateKey()">GENERATE</button>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="tab('type')">TYPE</button>
<button onclick="tab('list')">LIST</button>
<button onclick="tab('digital')">DIGITAL</button>
<button id="keyBtn" onclick="tab('key')" style="display:none">KEY</button>
<button onclick="logout()">LOGOUT</button>
</div>

<div id="notif"></div>

<script>

/* INTRO FIX SUPER STABLE */
const intro = document.getElementById("intro")
const skipBtn = document.getElementById("skip")
const introVid = document.getElementById("introVid")

function startApp(){
 if(!intro) return
 intro.style.opacity="0"
 setTimeout(()=>{
  intro.remove()
  document.getElementById("login").classList.add("active")
 },300)
}

/* tombol skip FIX */
skipBtn.addEventListener("click", startApp)

/* auto skip setelah video selesai */
introVid.addEventListener("ended", startApp)

/* fallback auto skip (jaga2 kalau video error) */
setTimeout(startApp, 7000)

/* DATA */
let role="guest"
let keys=JSON.parse(localStorage.getItem("keys")||"{}")

let defaultList=`⚓ STOK YANZZ ⚓
AIMLOCK 75% 4K
HEADLOCK 75% 5K
BODY LOCK V1 5K`

/* LOGIN */
function login(){
 let u=user.value
 let p=pass.value

 if(u==="YanzzMEMBER" && p==="12345678"){
  role="member"
 }
 else if(u==="YanzzOWNER" && p==="27051210#$+-"){
  role="admin"
  keyBtn.style.display="block"
  editList.style.display="block"
  saveBtn.style.display="block"
 }
 else if(keys[u]){
  if(Date.now()>keys[u].exp) return alert("Key expired")
  role="prem"
 }
 else{
  alert("Login gagal")
  return
 }

 login.classList.remove("active")
 main.classList.add("active")
 document.querySelector(".nav").style.display="flex"

 applyRole()
 loadList()
}

/* ROLE */
function applyRole(){
 if(role==="member"){
  bugType.value="DELAY HARD"
  [...bugType.options].forEach(o=>{
   if(o.value!=="DELAY HARD") o.disabled=true
  })
 }
}

/* LIST */
function loadList(){
 let data=localStorage.getItem("list")||defaultList
 editList.value=data
 renderList()
}

function renderList(){
 let data=localStorage.getItem("list")||defaultList
 listContainer.innerHTML=""
 data.split("\n").forEach(t=>{
  let d=document.createElement("div")
  d.className="item"
  d.innerText=t
  listContainer.appendChild(d)
 })
}

function saveList(){
 localStorage.setItem("list",editList.value)
 alert("List disimpan")
 renderList()
}

/* TAB */
function tab(t){
 ["type","list","digital","key"].forEach(id=>{
  document.getElementById(id).style.display="none"
 })
 document.getElementById(t).style.display="block"
}

/* RESET */
function resetForm(){
 number.value=""
}

/* SIMULASI */
function run(){
 let num=number.value
 let type=bugType.value

 if(role==="member") type="DELAY HARD"

 notif.style.display="block"

 let p=0
 let i=setInterval(()=>{
  p+=20
  notif.innerHTML=`TARGET: ${num}<br>TYPE: ${type}<br>STATUS: ${p}%`
  if(p>=100){
   clearInterval(i)
   notif.innerHTML+=`<br>STATUS: SUCCESS`
  }
 },250)
}

/* KEY */
function generateKey(){
 let k=newKey.value
 if(keys[k]) return alert("Key sudah ada")

 keys[k]={exp:Date.now()+(durasi.value*86400000)}
 localStorage.setItem("keys",JSON.stringify(keys))

 alert("Key dibuat")
}

/* LINK */
function openLink(url){window.open(url)}
function wa(){window.open("https://wa.me/6282164463311")}

/* LOGOUT */
function logout(){location.reload()}

</script>

</body>
</html>
