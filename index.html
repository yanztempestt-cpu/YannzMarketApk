<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>YANNZ JB STORE ⚓</title>

<style>
body{
 margin:0;
 font-family:sans-serif;
 color:white;
 background:linear-gradient(180deg,#0f0c29,#302b63,#24243e);
}

/* page */
.page{display:none;padding:20px;height:90vh;overflow:auto;}
.active{display:block;}

h2{
 text-align:center;
 text-shadow:0 0 15px purple;
}

/* input & button */
input,button{
 width:90%;
 padding:12px;
 margin:6px;
 border:none;
 border-radius:10px;
}

button{
 background:linear-gradient(45deg,#7b00ff,#00c3ff);
 color:white;
 font-weight:bold;
 box-shadow:0 0 10px purple;
}

/* card */
.card{
 background:rgba(255,255,255,0.08);
 padding:15px;
 margin:12px 0;
 border-radius:15px;
 backdrop-filter:blur(6px);
 box-shadow:0 0 15px rgba(128,0,255,0.6);
 transition:0.3s;
}

.card:hover{
 transform:scale(1.03);
}

/* item */
.item{
 padding:10px;
 border-bottom:1px solid rgba(255,255,255,0.1);
 cursor:pointer;
 display:flex;
 justify-content:space-between;
}

.item:hover{
 background:rgba(255,255,255,0.1);
}

.sold{
 color:red;
 font-weight:bold;
 text-shadow:0 0 5px red;
}

.label{
 color:yellow;
 font-size:12px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="page active">
<h2>🔒 LOGIN</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">MASUK</button>
</div>

<!-- GATE -->
<div id="gate" class="page">
<h2>⚓ MENU UTAMA</h2>

<div class="card">
<button onclick="joinChannel()">📢 JOIN SALURAN</button>
<button onclick="joinGroup()">👥 JOIN GRUB</button>
</div>

<div class="card">
<button onclick="alert(rewardText)">🎁 GATE REWARD</button>
</div>

<div class="card">
<button onclick="showPage('list')">📋 OPEN LIST</button>
</div>
</div>

<!-- LIST -->
<div id="list" class="page">
<h2>📋 OPEN LIST</h2>

<div id="listContainer"></div>

<button onclick="showPage('gate')">⬅ KEMBALI</button>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
<h2>⚙️ ADMIN PANEL</h2>

<h3>Tambah Item</h3>
<input id="name" placeholder="Nama item">
<input id="price" placeholder="Harga">
<input id="label" placeholder="Label (BEST/NEW)">
<button onclick="addItem()">Tambah</button>

<h3>Control Item</h3>
<input id="index" placeholder="Index item">
<button onclick="markSold()">Tandai SOLD</button>
<button onclick="deleteItem()">Hapus</button>

<h3>Edit Reward</h3>
<input id="rewardInput">
<button onclick="saveReward()">Simpan</button>

<button onclick="showPage('gate')">⬅ KEMBALI</button>
</div>

<script>

// ===== LOGIN =====
const ADMIN = {user:"OWNER_YANZZ",pass:"27051210#$+-"}
const MEMBER = {user:"YanzzMEMBER",pass:"12345678"}

function login(){
 let u=userInput();
 let p=passInput();

 if(u===ADMIN.user && p===ADMIN.pass){
  showPage("admin");
 }else if(u===MEMBER.user && p===MEMBER.pass){
  showPage("gate");
 }else{
  alert("Login salah!");
 }
}

// ===== NAV =====
function showPage(id){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
 document.getElementById(id).classList.add("active");
}

// ===== JOIN =====
function joinChannel(){
 window.open("https://whatsapp.com/channel/0029VbCWWN96rsQsfLC0B71f");
}

function joinGroup(){
 window.open("https://chat.whatsapp.com/HZJVWkSLsECBV7f1S4FpxN?mode=gi_t");
}

// ===== DATA =====
let items = JSON.parse(localStorage.getItem("items")||"[]");

// default isi awal
if(items.length===0){
 items = [
  {name:"WDP ML",price:"28K"},
  {name:"DRIP CLIENT V1",price:"15K",label:"BEST"},
  {name:"AIMLOCK",price:"5K"},
  {name:"APK PUSH KONTAK",price:"5K"}
 ];
}

// ===== RENDER =====
function render(){
 let el=document.getElementById("listContainer");
 el.innerHTML="";

 items.forEach((it,i)=>{
  el.innerHTML+=`
  <div class="card">
   <div class="item" onclick="order('${it.name}','${it.price}')">
    <span>${it.name} (${it.price}) 
     <div class="label">${it.label||""}</div>
    </span>
    <span class="${it.sold?'sold':''}">
     ${it.sold?'SOLD':''}
    </span>
   </div>
   <small>#${i}</small>
  </div>`;
 });

 localStorage.setItem("items",JSON.stringify(items));
}

// ===== ORDER =====
function order(name,price){
 let text=`Halo BG saya ingin beli:\n${name}\nHarga: ${price}`;
 window.open(`https://wa.me/6282164463311?text=${encodeURIComponent(text)}`);
}

// ===== ADMIN =====
function addItem(){
 let name=val("name");
 let price=val("price");
 let label=val("label");

 items.push({name,price,label});
 render();
}

function markSold(){
 let i=val("index");
 if(items[i]) items[i].sold=true;
 render();
}

function deleteItem(){
 let i=val("index");
 items.splice(i,1);
 render();
}

// ===== REWARD =====
let rewardText = localStorage.getItem("reward") || "Belum ada reward";

function saveReward(){
 rewardText = val("rewardInput");
 localStorage.setItem("reward",rewardText);
 alert("Disimpan");
}

// ===== HELPER =====
function val(id){return document.getElementById(id).value}
function userInput(){return val("user")}
function passInput(){return val("pass")}

// ===== INIT =====
render();

</script>

</body>
</html>
