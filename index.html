<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rverx</title>

<style>
body{
 margin:0;
 background:#0b0b0f;
 color:#b7fff5;
 font-family:monospace;
 overflow:hidden;
}

/* MATRIX */
canvas{
 position:fixed;
 width:100%;
 height:100%;
 z-index:-1;
 opacity:0.15;
}

/* LOGO */
.logo{
 width:100px;height:100px;
 border-radius:50%;
 margin:20px auto;
 display:block;
 border:2px solid #00e6c3;
 box-shadow:0 0 15px #00e6c3;
}

/* BOX */
.box{
 background:rgba(15,15,20,0.85);
 border:1px solid #1f3f3a;
 margin:10px;
 padding:15px;
 border-radius:10px;
 text-align:center;
 backdrop-filter:blur(6px);
}

/* INPUT */
input,select{
 width:90%;
 padding:10px;
 margin:6px;
 background:#0b0b0f;
 border:1px solid #1f3f3a;
 color:#b7fff5;
 border-radius:6px;
}

/* BUTTON */
.row{display:flex;gap:10px}
button{
 flex:1;
 padding:10px;
 background:#00e6c3;
 border:none;
 color:black;
 font-weight:bold;
 border-radius:6px;
 transition:0.2s;
}
button:hover{opacity:0.8}

/* TERMINAL */
#terminal{
 height:150px;
 overflow:auto;
 font-size:12px;
 margin-top:10px;
 border-top:1px solid #1f3f3a;
 padding-top:5px;
 color:#9fffe7;
}

/* LOADING */
#loading{
 display:none;
 margin-top:15px;
 font-size:13px;
 opacity:0.8;
}

/* subtle glitch */
.glitch{
 animation:glitch 0.3s linear 2;
}
@keyframes glitch{
 0%{transform:translate(0)}
 25%{transform:translate(1px,-1px)}
 50%{transform:translate(-1px,1px)}
 100%{transform:translate(0)}
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- LOGIN -->
<div id="loginPage">
<img src="https://files.catbox.moe/bi2bn4.png" class="logo" id="logo">

<div class="box">
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">
<input id="key" placeholder="Key (VIP)">

<div class="row">
<button onclick="window.close()">Kembali</button>
<button onclick="handleLogin()">Berikutnya</button>
</div>

<div id="loading">Connecting to secure node...</div>

</div>
</div>

<!-- MENU -->
<div id="menuPage" style="display:none">
<img src="https://files.catbox.moe/bi2bn4.png" class="logo">

<div class="box">
<input id="number" placeholder="62XXXXXXXXX">

<select id="bugType">
<option>FORCE CLOSE</option>
<option>DELAY HARD</option>
<option>BLANK UI</option>
<option>ATTACK IOS</option>
</select>

<div class="row">
<button onclick="resetForm()">Batal</button>
<button onclick="startSim()">Konfirmasi</button>
</div>

<div id="terminal"></div>
</div>
</div>

<script>

// ELEMENT FIX
const loginPage = document.getElementById("loginPage")
const menuPage = document.getElementById("menuPage")
const loading = document.getElementById("loading")
const logo = document.getElementById("logo")

// SOUND ringan
function clickSound(){
 let a=new AudioContext()
 let o=a.createOscillator()
 o.frequency.value=600
 o.connect(a.destination)
 o.start()
 setTimeout(()=>o.stop(),60)
}

// VIBRATE
function vib(x){
 if(navigator.vibrate) navigator.vibrate(x)
}

// LOGIN
function handleLogin(){
 clickSound()
 vib(30)

 loading.style.display="block"
 logo.classList.add("glitch")

 setTimeout(()=>{
  logo.classList.remove("glitch")

  let u=user.value
  let p=pass.value

  if(
   (u==="YanzzMEMBER" && p==="12345678") ||
   (u==="YanzzMEMBERVIP" && p==="7777777") ||
   (u==="YanzzPREM" && p==="1111111") ||
   (u==="YanzzOWNER" && p==="27051210#$+-")
  ){
   if(u==="YanzzOWNER") alert("Welcome, Owner")

   loginPage.style.display="none"
   menuPage.style.display="block"
  }else{
   loading.style.display="none"
   alert("Login gagal")
  }

 },1200)
}

// TERMINAL REALISTIC
function log(t,delay=0){
 setTimeout(()=>{
  terminal.innerHTML+="> "+t+"<br>"
  terminal.scrollTop=terminal.scrollHeight
 },delay)
}

// SIM
function startSim(){
 let num=number.value
 let type=bugType.value

 if(!num) return alert("Nomor kosong")

 terminal.innerHTML=""

 log("Resolving node...",0)
 log("Establishing secure channel...",300)
 log("Handshake OK",700)
 log("Injecting task...",1000)
 log("Running process...",1300)

 setTimeout(()=>{
  log("TARGET : "+num)
  log("TYPE   : "+type)
  log("STATUS : SUCCESS (SIMULASI)")
 },1800)
}

// RESET
function resetForm(){
 number.value=""
 terminal.innerHTML=""
}

// MATRIX
let c=document.getElementById("matrix")
let ctx=c.getContext("2d")
c.height=innerHeight
c.width=innerWidth

let letters="01RVX".split("")
let drops=Array(Math.floor(c.width/12)).fill(1)

setInterval(()=>{
 ctx.fillStyle="rgba(0,0,0,0.07)"
 ctx.fillRect(0,0,c.width,c.height)
 ctx.fillStyle="#00e6c3"

 drops.forEach((y,i)=>{
  let t=letters[Math.random()*letters.length|0]
  ctx.fillText(t,i*12,y*12)
  if(y*12>c.height) drops[i]=0
  drops[i]++
 })
},60)

</script>

<script src="Rverx.js"></script>

</body>
  </html>
