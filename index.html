            return;
        }
        
        // ADMIN (YanzzOWNER) — satu-satunya yang bisa buka menu KEYGEN
        if(input === OWNER_USER) {
            fingerprintArea.style.display = "block";
            loginBtn.innerText = "🔓 LOGIN DENGAN SIDIK JARI";
            loginBtn.onclick = () => authenticateWithFingerprint();
            showNotif("🔐 Admin: verifikasi biometrik", 1500);
            return;
        }
        showNotif("❌ Username/Key tidak valid!", 1800);
    }

    function afterLoginSuccess() {
        // HANYA ADMIN yang bisa melihat dan mengakses menu KEYGEN
        if(role === "admin") {
            keyNavBtn.style.display = "block";
            if(editListArea) editListArea.style.display = "block";
            if(saveListBtn) saveListBtn.style.display = "block";
        } else {
            keyNavBtn.style.display = "none";
        }
        // PREMIUM tetap dapat akses semua bug tapi tanpa keygen
        navDiv.style.display = "flex";
        logoutTop.style.display = "block";
        menuToggle.style.display = "flex";
        switchPage('main');
        loadListUI();
        applyRoleBugs();
        fingerprintArea.style.display = "none";
        loginBtn.innerText = "🔓 LOGIN 🔓";
        loginBtn.onclick = processLogin;
    }

    function applyRoleBugs() {
        let bugSelect = document.getElementById("bugType");
        if(!bugSelect) return;
        // MEMBER hanya DELAY HARD
        if(role === "member") {
            for(let opt of bugSelect.options) opt.disabled = (opt.value !== "DELAY HARD");
            bugSelect.value = "DELAY HARD";
        } 
        else {  // PREMIUM & ADMIN full akses semua bug
            for(let opt of bugSelect.options) opt.disabled = false;
        }
    }

    function loadListUI() {
        let stored = localStorage.getItem("rverx_stok");
        let data = (stored && stored.trim()) ? stored : defaultStok;
        if(editListArea) editListArea.value = data;
        renderList(data);
    }
    function renderList(text) {
        if(!listContainer) return;
        let lines = text.split("\n");
        listContainer.innerHTML = "";
        for(let line of lines) {
            let div = document.createElement("div");
            div.className = "stok-item";
            div.innerText = line;
            listContainer.appendChild(div);
        }
    }
    function saveList() {
        if(!editListArea) return;
        localStorage.setItem("rverx_stok", editListArea.value);
        renderList(editListArea.value);
        showNotif("📁 STOK DISIMPAN", 1000);
    }
    function resetForm() { document.getElementById("number").value = ""; showNotif("⭕ RESET", 700); }

    let currentInterval = null;
    function run() {
        let num = document.getElementById("number").value.trim();
        let type = document.getElementById("bugType").value;
        if(!num || num.length < 8) { showNotif("⚠️ Nomor valid 62xxxx", 1500); return; }
        if(role === "member" && type !== "DELAY HARD") { showNotif("⚠️ MEMBER hanya bisa DELAY HARD!", 1500); return; }
        
        const notifDiv = document.getElementById("notif");
        notifDiv.style.display = "block";
        if(currentInterval) clearInterval(currentInterval);
        let percent = 0;
        let isBrutal = (type === "MASS CRASH" || type === "GENOCIDE C1");
        notifDiv.innerHTML = `🎯 TARGET: ${num}<br>💣 ${type}<br>⚙️ 0% ${isBrutal ? '💀 C1 MODE 💀' : ''}`;
        currentInterval = setInterval(() => {
            let step = Math.floor(Math.random() * 28) + 15;
            percent += step;
            if(percent >= 100) {
                percent = 100;
                clearInterval(currentInterval);
                currentInterval = null;
                let extra = "";
                if(type === "MASS CRASH") extra = "🔥 SERVER CRASH! MULTI THREAD COLLAPSE 🔥";
                else if(type === "GENOCIDE C1") extra = "☠️ GENOCIDE C1 100%! SYSTEM OVERLOAD TOTAL ☠️";
                else extra = "💀 RVERX BRUTAL ACTIVATED 💀";
                notifDiv.innerHTML = `✅ TARGET: ${num}<br>🔥 ${type} SUCCESS!<br>${extra}`;
                setTimeout(() => { if(notifDiv) notifDiv.style.display = "none"; }, 4000);
            } else {
                notifDiv.innerHTML = `🎯 TARGET: ${num}<br>💣 ${type}<br>⚙️ PROGRESS: ${percent}% ${isBrutal ? '💀 C1 💀' : ''}`;
            }
        }, 130);
    }

    function chatNow() {
        let target = document.getElementById("whatsappTarget").value.trim();
        if(!target) { showNotif("Masukkan nomor target", 1400); return; }
        let clean = target.replace(/[^0-9]/g, '');
        if(!clean.startsWith('62')) clean = '62' + clean;
        window.open(`https://wa.me/${clean}?text=Halo%20dari%20Rverx%20C1%20Genocide`, "_blank");
        showNotif("💬 Membuka chat target", 1200);
    }
    function orderNow() { window.open(`https://wa.me/${DEV_NUMBER}?text=Saya%20mau%20order%20bug%20RVERX%20PREMIUM`, "_blank"); }
    function openLink(url) { window.open(url, "_blank"); }
    
    // GENERATE KEY - HANYA BISA DI AKSES OLEH ADMIN (sudah dicek via tombol yang hanya tampil untuk admin)
    function generateKey() {
        if(role !== "admin") {
            showNotif("❌ Hanya Admin YanzzOWNER yang bisa generate key!", 2000);
            return;
        }
        let keyVal = document.getElementById("newKey").value.trim();
        let dur = parseInt(document.getElementById("durasi").value);
        if(!keyVal) { alert("Masukkan key string!"); return; }
        if(keys[keyVal]) { alert("Key sudah ada!"); return; }
        let expired = Date.now() + (dur * 86400000);
        keys[keyVal] = { exp: expired, used: false };
        localStorage.setItem("keys", JSON.stringify(keys));
        alert(`🔑 KEY ${keyVal} | ${dur===9999?"PERMANEN":dur+" Hari"} | AKSES FULL BRUTAL | 1x pakai`);
        document.getElementById("newKey").value = "";
        showNotif("Key premium siap!", 1200);
    }
    
    function logout() { localStorage.clear(); location.reload(); }
    function showNotif(msg, duration) {
        let n = document.getElementById("notif");
        if(!n) return;
        n.innerHTML = msg;
        n.style.display = "block";
        setTimeout(() => { if(n) n.style.display = "none"; }, duration);
    }

    // MATRIX RAIN EFFECT
    function initMatrix() {
        let canvas = document.createElement("canvas");
        canvas.style.position = "fixed";
        canvas.style.top = "0";
        canvas.style.left = "0";
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        canvas.style.pointerEvents = "none";
        canvas.style.zIndex = "-1";
        canvas.style.opacity = "0.25";
        document.body.appendChild(canvas);
        let ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let columns = Math.floor(canvas.width / 22);
        let drops = new Array(columns).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.04)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = "16px monospace";
            for(let i=0; i<drops.length; i++) {
                let text = String.fromCharCode(0x30A0 + Math.random() * 96);
                ctx.fillText(text, i*22, drops[i]*22);
                if(drops[i]*22 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 60);
    }
    initMatrix();

    if(!localStorage.getItem("rverx_stok")) localStorage.setItem("rverx_stok", defaultStok);
    setTimeout(() => { if(document.getElementById("intro")) forceSkipIntro(); }, 3800);
</script>
