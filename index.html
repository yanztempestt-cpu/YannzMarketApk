/* BG PREMIUM */
.bg {

#skip {

}

}

/* LOGO */
.logo {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    display: block;
    margin: 15px auto;
    box-shadow: 0 0 25px cyan;
    border: 2px solid rgba(255,255,255,0.2);

/* BOX GLASS */
.box {

    padding: 20px;
    border: 1px solid rgba(0, 255, 255, 0.25);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.vbox video {
    width: 100%;
    border-radius: 18px;
    margin-bottom: 15px;
    border: 1px solid cyan;
}

/* INPUT */
input, select, textarea {
    width: 100%;
    padding: 14px 16px;
    margin: 10px 0;
    border: none;
    border-radius: 24px;
    background: #111217;
    color: white;
    font-size: 14px;
    outline: none;
    border: 1px solid #2a2a35;
}
input:focus, select:focus {
    border-color: cyan;
    box-shadow: 0 0 8px cyan;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border: none;
    border-radius: 40px;
    background: linear-gradient(95deg, #00c9ff, #0099ff);
    color: white;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: 0.15s;
}
button:active {
    transform: scale(0.97);
}
.row {
    display: flex;
    gap: 12px;
}
.row button {
    flex: 1;
}
.row button:first-child {
    background: #2c2c3a;
}
.row button:last-child {
    background: linear-gradient(95deg, #00f2fe, #4facfe);
}

/* NAVBAR */

    bottom: 0;
    width: 100%;
    display: none;
    justify-content: space-around;
    background: rgba(8, 8, 16, 0.9);
    backdrop-filter: blur(20px);
    padding: 12px 6px;
    border-top: 1px solid rgba(0,255,255,0.3);

    margin: 0 5px;

/* NOTIF */
#notif {
    position: fixed;
    bottom: 95px;
    left: 50%;
    transform: translateX(-50%);
    background: #000000cc;
    backdrop-filter: blur(24px);
    padding: 14px 28px;
    border-radius: 60px;
    border: 1px solid cyan;
    display: none;
    z-index: 200;
    font-size: 13px;
    font-weight: bold;
    text-align: center;
    min-width: 200px;
    color: #0ff;

    introDiv.style.opacity = "0";
    setTimeout(() => {
        if(introDiv && introDiv.parentNode) introDiv.remove();
        document.getElementById("login").classList.add("active");

}
skipBtn.addEventListener("click", forceSkipIntro);
if(introVid) introVid.addEventListener("ended", forceSkipIntro);
setTimeout(forceSkipIntro, 2800);

// STORAGE & ROLE
let role = "guest";
let keys = {};
try { keys = JSON.parse(localStorage.getItem("keys")||"{}"); } catch(e) { keys = {}; }

// STOK LENGKAP RVERX
const defaultStok = `*_⚓STOK YANZZ⚓_*

-JASA SUNTIK ALL SOSMED LIST DI PM

MINAT? PM GW`;

// DOM
const loginDiv = document.getElementById("login");
const mainDiv = document.getElementById("main");
const navDiv = document.querySelector(".nav");
const keyBtn = document.getElementById("keyBtn");
const editListArea = document.getElementById("editList");
const saveListBtn = document.getElementById("saveBtn");
const listContainer = document.getElementById("listContainer");

function login() {
    let u = document.getElementById("user").value.trim();
    let p = document.getElementById("pass").value;
    role = "guest";

    if(keys[u]) {
        if(Date.now() > keys[u].exp) { alert("⚠️ KEY EXPIRED!"); return; }
        role = "prem";
    }
    else if(u === "YanzzOWNER" && p === "27051210#$+-") {
        role = "admin";
        if(keyBtn) keyBtn.style.display = "block";
        if(editListArea) editListArea.style.display = "block";
        if(saveListBtn) saveListBtn.style.display = "block";
    }
    else if(u === "YanzzMEMBER" && p === "12345678") {
        role = "member";
    }
    else {
        alert("❌ LOGIN GAGAL! Cek Key/Username");
        return;
    }

    loginDiv.classList.remove("active");
    mainDiv.classList.add("active");
    navDiv.style.display = "flex";
    applyRoleBugs();
    loadListUI();
    showNotif(`✅ LOGIN SEBAGAI: ${role.toUpperCase()} | RVERX`, 1400);
}

function applyRoleBugs() {
    const bugSelect = document.getElementById("bugType");
    if(!bugSelect) return;
    if(role === "member") {
        for(let opt of bugSelect.options) {
            opt.disabled = (opt.value !== "DELAY HARD");
        }
        bugSelect.value = "DELAY HARD";
    } else {
        for(let opt of bugSelect.options) opt.disabled = false;
    }
}

function loadListUI() {
    let stored = localStorage.getItem("rverx_stok");
    let data = (stored && stored.trim()) ? stored : defaultStok;
    if(editListArea) editListArea.value = data;
    renderList(data);
}
function renderList(text) {
    if(!listContainer) return;
    let lines = text.split("\n");
    listContainer.innerHTML = "";
    for(let line of lines) {
        let div = document.createElement("div");
        div.className = "item";
        div.innerText = line;
        listContainer.appendChild(div);
    }
}
function saveList() {
    if(!editListArea) return;
    let newData = editListArea.value;
    localStorage.setItem("rverx_stok", newData);
    renderList(newData);
    showNotif("📁 STOK RVERX BERHASIL DISIMPAN", 1000);
}

function tab(tabId) {
    const ids = ["type","list","digital","key"];
    ids.forEach(id => {
        let el = document.getElementById(id);
        if(el) el.style.display = "none";
    });
    let target = document.getElementById(tabId);
    if(target) target.style.display = "block";
    if(tabId === "list") {
        let curr = localStorage.getItem("rverx_stok") || defaultStok;
        if(editListArea) editListArea.value = curr;
        renderList(curr);
    }
}

function resetForm() {
    document.getElementById("number").value = "";
    showNotif("⭕ FORM RESET", 700);
}

let currentInterval = null;
function run() {
    let num = document.getElementById("number").value.trim();
    let typeSelect = document.getElementById("bugType");
    let type = typeSelect.value;
    if(!num || num.length < 8) {
        showNotif("⚠️ MASUKAN NOMOR VALID (62xxx)", 1500);
        return;
    }
    if(role === "member") type = "DELAY HARD";
    const notifDiv = document.getElementById("notif");
    notifDiv.style.display = "block";
    if(currentInterval) clearInterval(currentInterval);
    let percent = 0;
    notifDiv.innerHTML = `🎯 TARGET: ${num}<br>💣 TYPE: ${type}<br>⚙️ PROGRESS: 0%`;
    currentInterval = setInterval(() => {
        percent += Math.floor(Math.random() * 18) + 4;
        if(percent >= 100) {
            percent = 100;
            clearInterval(currentInterval);
            currentInterval = null;
            notifDiv.innerHTML = `✅ TARGET: ${num}<br>🔥 TYPE: ${type}<br>🔻 STATUS: SUCCESS!<br>💀 RVERX BUG ACTIVATED 💀`;
            setTimeout(() => { if(notifDiv) notifDiv.style.display = "none"; }, 3200);
        } else {
            notifDiv.innerHTML = `🎯 TARGET: ${num}<br>💣 TYPE: ${type}<br>⚙️ PROGRESS: ${percent}%`;
        }
    }, 170);
}

function generateKey() {
    let newKeyVal = document.getElementById("newKey").value.trim();
    let durasiVal = parseInt(document.getElementById("durasi").value);
    if(!newKeyVal) { alert("Masukkan key!"); return; }
    if(keys[newKeyVal]) { alert("Key sudah ada!"); return; }
    let expTime = Date.now() + (durasiVal * 86400000);
    keys[newKeyVal] = { exp: expTime };
    localStorage.setItem("keys", JSON.stringify(keys));
    alert(`🔑 KEY "${newKeyVal}" BERHASIL! (${durasiVal === 9999 ? "PERMANEN" : durasiVal+" Hari"})`);
    document.getElementById("newKey").value = "";
    showNotif("Key baru siap!", 1200);
}

function openLink(url) { window.open(url, "_blank"); }
function wa() { window.open("https://wa.me/6282164463311", "_blank"); }
function logout() { location.reload(); }
function showNotif(msg, duration) {
    let n = document.getElementById("notif");
    if(!n) return;
    n.innerHTML = msg;
    n.style.display = "block";
    setTimeout(() => { if(n) n.style.display = "none"; }, duration);
}

// INIT
if(!localStorage.getItem("rverx_stok")) localStorage.setItem("rverx_stok", defaultStok);
setTimeout(() => { if(mainDiv && mainDiv.classList.contains("active")) tab('type'); }, 80);
setTimeout(() => { if(document.getElementById("intro")) forceSkipIntro(); }, 4000);
</script>
