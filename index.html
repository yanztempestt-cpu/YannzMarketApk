<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rverx</title><style>
body{margin:0;font-family:sans-serif;background:black;color:white;overflow:hidden}
video.bg{position:fixed;width:100%;height:100%;object-fit:cover;z-index:-2;filter:blur(6px) brightness(0.4)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:-1}
.logo{width:110px;height:110px;border-radius:50%;display:block;margin:20px auto;border:3px solid #00ffe0;box-shadow:0 0 20px #00ffe0}
.box{background:rgba(0,0,0,0.7);margin:15px;padding:15px;border-radius:15px}
input,select{width:95%;padding:10px;margin:5px;border-radius:8px;border:none;background:#111;color:#fff}
button{padding:10px;border:none;border-radius:10px;background:#00ffe0;color:black;font-weight:bold;margin:5px}
.row{display:flex;gap:10px}
.tabs{display:flex;justify-content:space-around;margin-top:10px}
.tab{padding:10px;background:#111;border-radius:10px;cursor:pointer}
.active{background:#00ffe0;color:black}
.page{display:none}
.show{display:block}
#list{max-height:300px;overflow:auto}
</style></head>
<body><video class="bg" autoplay muted loop src="https://files.catbox.moe/7s41d3.mp4"></video>

<div class="overlay"></div><!-- LOGIN --><div id="login" class="show">
<img src="https://files.catbox.moe/bi2bn4.png" class="logo">
<div class="box">
<input id="user" placeholder="Username">
<input id="pass" placeholder="Password">
<div class="row">
<button onclick="login()">BERIKUTNYA</button>
</div>
</div>
</div><!-- MAIN --><div id="main">
<img src="https://files.catbox.moe/bi2bn4.png" class="logo"><div class="tabs">
<div class="tab active" onclick="openTab('type')">TYPE</div>
<div class="tab" onclick="openTab('list')">LIST</div>
<div class="tab" onclick="openTab('digital')">DIGITAL</div>
<div class="tab" id="keyTab" style="display:none" onclick="openTab('key')">KEY</div>
</div><div id="type" class="page show box">
<input id="number" placeholder="62xxxx">
<select id="bugType">
<option>DELAY HARD</option>
<option>FORCE CLOSE</option>
<option>BLANK UI</option>
<option>ATTACK IOS</option>
</select>
<div class="row">
<button onclick="runSim()">KONFIRMASI</button>
<button onclick="logout()">LOGOUT</button>
</div>
<div id="result"></div>
</div><div id="list" class="page box">
<pre id="listText"></pre>
</div><div id="digital" class="page box">
<button onclick="order()">ORDER KE WA</button>
</div><div id="key" class="page box">
<input id="newKey" placeholder="Masukan key">
<select id="durasi">
<option>1HARI</option>
<option>3HARI</option>
<option>7HARI</option>
<option>1BULAN</option>
<option>PERMANEN</option>
</select>
<button onclick="generateKey()">GENERATE</button>
<div id="keyList"></div>
</div></div><script>
let role="";
let keys=JSON.parse(localStorage.getItem("keys")||"[]");

function login(){
 let u=user.value,p=pass.value;

 if(u==="YanzzMEMBER" && p==="12345678"){
  role="member";
 }
 else if(u==="YanzzPREM" && p==="1111111"){
  let use=localStorage.getItem("premUse")||0;
  if(use>=2)return alert("Limit habis");
  localStorage.setItem("premUse",++use);
  role="vip";
 }
 else if(u==="YanzzOWNER" && p==="27051210#$+-"){
  role="admin";
  keyTab.style.display="block";
 }
 else if(keys.find(k=>k.value===p && Date.now()<k.exp)){
  role="vip";
 }
 else return alert("Login gagal");

 login.style.display="none";
 main.style.display="block";
}

function logout(){location.reload()}

function openTab(id){
 document.querySelectorAll(".page").forEach(p=>p.classList.remove("show"));
 document.getElementById(id).classList.add("show");
}

function runSim(){
 let type=bugType.value;
 if(role==="member" && type!=="DELAY HARD") return alert("Member hanya delay");
 result.innerHTML=`TARGET: ${number.value}<br>TYPE: ${type}<br>STATUS: SUCCESS (SIMULASI)`;
}

function order(){
 window.open("https://wa.me/6282164453311");
}

function generateKey(){
 let val=newKey.value;
 if(keys.find(k=>k.value===val)) return alert("Key sudah ada");
 let d=durasi.value;
 let exp=d==="PERMANEN"?9999999999999:Date.now()+86400000;
 keys.push({value:val,exp});
 localStorage.setItem("keys",JSON.stringify(keys));
 renderKeys();
}

function renderKeys(){
 keyList.innerHTML=keys.map(k=>k.value+" - "+(k.exp===9999999999999?"PERM":new Date(k.exp).toLocaleDateString())).join("<br>");
}
renderKeys();

listText.innerText=`⚓STOK YANZZ⚓\n- DRIP CLINET 10K\n- AIMLOCK 5K\n- DLL LENGKAP`;

</script><script src="Rverx.js"></script></body>
</html>
