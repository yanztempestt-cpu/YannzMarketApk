<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rverx</title>

<style>
body{
 margin:0;
 background:#0b0b0f;
 font-family:sans-serif;
 color:white;
 overflow:hidden;
}

/* INTRO */
#intro video{
 position:fixed;
 width:100%;
 height:100%;
 object-fit:cover;
}
#skip{
 position:fixed;
 top:20px;
 right:20px;
 padding:8px 12px;
 background:rgba(0,0,0,0.6);
 border:1px solid cyan;
 color:white;
}

/* BG */
.bgVid{
 position:fixed;
 width:100%;
 height:100%;
 object-fit:cover;
 filter:blur(12px) brightness(0.5);
 z-index:-1;
}

/* LOGO */
.logo{
 width:90px;
 height:90px;
 border-radius:50%;
 display:block;
 margin:15px auto;
 box-shadow:0 0 15px cyan;
}

/* BOX */
.box{
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(10px);
 margin:10px;
 padding:15px;
 border-radius:15px;
}

/* INPUT */
input,select{
 width:100%;
 padding:10px;
 margin:5px 0;
 border-radius:10px;
 border:none;
 background:#111;
 color:white;
}

/* BUTTON */
button{
 width:100%;
 padding:10px;
 border:none;
 border-radius:10px;
 margin:5px 0;
 background:linear-gradient(45deg,cyan,blue);
 color:white;
 display:flex;
 align-items:center;
 justify-content:center;
 gap:8px;
}

/* NAV */
.nav{
 display:flex;
 justify-content:space-around;
 background:#000;
 padding:10px;
 position:fixed;
 bottom:0;
 width:100%;
}

.page{display:none}
.active{display:block}

/* LIST */
.list{
 max-height:50vh;
 overflow:auto;
}
.item{
 padding:8px;
 margin:5px;
 background:#111;
 border-radius:10px;
}

/* NOTIF */
#notif{
 position:fixed;
 bottom:80px;
 left:50%;
 transform:translateX(-50%);
 background:#000;
 padding:10px;
 border-radius:10px;
 border:1px solid cyan;
 display:none;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<video src="https://files.catbox.moe/7s41d3.mp4" autoplay></video>
<button id="skip" onclick="startApp()">⏩ SKIP</button>
</div>

<!-- BG -->
<video class="bgVid" src="https://files.catbox.moe/lnj4we.mp4" autoplay loop muted></video>

<!-- LOGIN -->
<div id="login" class="page active">
<img src="https://files.catbox.moe/bi2bn4.png" class="logo">
<div class="box">
<input id="user" placeholder="USERNAME">
<input id="pass" placeholder="PASSWORD">
<button onclick="login()">🔐 LOGIN</button>
</div>
</div>

<!-- MAIN -->
<div id="main" class="page">

<img src="https://files.catbox.moe/bi2bn4.png" class="logo">

<!-- TYPE -->
<div id="type" class="tab active box">
<input id="number" placeholder="62XXXXXXXX">
<select id="bugType">
<option>DELAY HARD</option>
<option>FORCE CLOSE</option>
<option>BLANK UI</option>
<option>ATTACK IOS</option>
</select>

<button onclick="run()">⚡ KONFIRMASI</button>
</div>

<!-- LIST -->
<div id="list" class="tab box">
<div class="list">
<div class="item">⚓ STOK YANZZ ⚓</div>
<div class="item">AIMLOCK 75% 4K</div>
<div class="item">HEADLOCK 75% 5K</div>
<div class="item">BODY LOCK V1 5K</div>
</div>
</div>

<!-- DIGITAL -->
<div id="digital" class="tab box">

<button onclick="openLink('https://chat.whatsapp.com/')">
💬 JOIN FJB
</button>

<button onclick="openLink('https://whatsapp.com/channel/')">
📢 SALURAN WA
</button>

<button onclick="openLink('https://instagram.com/')">
📸 INSTAGRAM
</button>

<button onclick="openLink('https://youtube.com/')">
▶️ YOUTUBE
</button>

<button onclick="wa('ORDER')">
🛒 ORDER KE ADMIN
</button>

</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="openTab('type')">⚙️</button>
<button onclick="openTab('list')">📋</button>
<button onclick="openTab('digital')">🌐</button>
<button onclick="logout()">🚪</button>
</div>

<!-- NOTIF -->
<div id="notif"></div>

<script>

// INTRO
function startApp(){
 intro.style.display="none"
 login.classList.add("active")
}

// LOGIN
let role="guest"
function login(){
 if(user.value==="YanzzMEMBER" && pass.value==="12345678"){
  role="member"
 }
 else if(user.value==="YanzzOWNER"){
  role="admin"
 }
 else{
  alert("Login gagal")
  return
 }

 login.classList.remove("active")
 main.classList.add("active")
}

// TAB
function openTab(t){
 document.querySelectorAll(".tab").forEach(x=>x.style.display="none")
 document.getElementById(t).style.display="block"
}

// LINK
function openLink(url){
 window.open(url)
}

// WA
function wa(text){
 window.open("https://wa.me/6282164453311?text="+text)
}

// RUN SIMULASI
function run(){
 let num=number.value
 let type=bugType.value

 if(role==="member" && type!=="DELAY HARD"){
  return alert("Member hanya DELAY")
 }

 notif.style.display="block"
 notif.innerHTML="TARGET: "+num+"<br>TYPE: "+type+"<br>STATUS: LOADING..."

 setTimeout(()=>{
  notif.innerHTML+="<br>STATUS: SUCCESS"
 },1500)
}

// LOGOUT
function logout(){
 location.reload()
}

</script>

</body>
</html>
