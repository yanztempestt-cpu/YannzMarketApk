<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RVERX XTREME | C1 GENOCIDE FINAL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            font-family: 'Poppins', 'Inter', system-ui, monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }

        /* HYPER BACKGROUND */
        .bg-void {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, #020110, #000000);
            z-index: -6;
        }
        .bg-glitch {
            position: fixed;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,255,0.1) 0px, rgba(0,255,255,0.1) 1px, transparent 1px, transparent 6px);
            z-index: -5;
            animation: flicker 0.12s infinite;
        }
        @keyframes flicker {
            0% { opacity: 0.3; }
            100% { opacity: 0.9; }
        }
        .cyber-grid {
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 255, 0.3) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 255, 255, 0.3) 1px, transparent 1px);
            background-size: 35px 35px;
            z-index: -4;
            opacity: 0.5;
        }
        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -3;
            opacity: 0.45;
        }

        .page {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow-y: auto;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.3), opacity 0.3s;
            background: rgba(2, 2, 12, 0.94);
            backdrop-filter: blur(22px);
            z-index: 10;
            padding-bottom: 100px;
        }
        .page:not(.active) {
            transform: translateX(110%) scale(0.95);
            opacity: 0;
            pointer-events: none;
        }
        .page.active {
            transform: translateX(0) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .glass-card {
            background: rgba(6, 6, 20, 0.92);
            backdrop-filter: blur(32px);
            border-radius: 48px;
            margin: 14px 18px;
            padding: 26px 20px;
            border: 1.5px solid rgba(0, 255, 255, 0.8);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .logo {
            width: 105px;
            height: 105px;
            border-radius: 50%;
            display: block;
            margin: 24px auto 15px;
            box-shadow: 0 0 60px cyan, 0 0 25px magenta;
            border: 2px solid white;
            animation: logoBrutal 1.2s infinite alternate;
        }
        @keyframes logoBrutal {
            0% { box-shadow: 0 0 5px cyan, 0 0 10px #f0f; }
            100% { box-shadow: 0 0 45px #0ff, 0 0 45px #ff00cc; }
        }

        input, select {
            width: 100%;
            padding: 18px 24px;
            margin: 12px 0;
            border: none;
            border-radius: 60px;
            background: #0a0a1c;
            color: #0ff;
            font-size: 16px;
            font-weight: 700;
            outline: none;
            border: 1.5px solid #0ff;
            transition: 0.2s;
        }
        input:focus, select:focus {
            border-color: #ff00cc;
            box-shadow: 0 0 22px #ff00cc;
            color: white;
        }
        .btn {
            width: 100%;
            padding: 17px;
            margin: 12px 0;
            border: none;
            border-radius: 60px;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.07s linear;
            color: white;
        }
        .btn:active { transform: scale(0.96); }
        .btn-brutal {
            background: linear-gradient(135deg, #ff0844, #ffb199, #ff0844);
            background-size: 200%;
            animation: brutalPulse 0.4s infinite alternate;
            box-shadow: 0 0 20px #ff0055;
        }
        @keyframes brutalPulse {
            0% { background-position: 0% 50%; box-shadow: 0 0 10px red; }
            100% { background-position: 100% 50%; box-shadow: 0 0 35px #ff3366; }
        }
        .btn-chat { background: linear-gradient(135deg, #25D366, #075E54); }
        .btn-yanzz {
            background: linear-gradient(135deg, #ff00cc, #ff0844, #ff00cc);
            background-size: 200%;
            animation: yanzzPulse 0.3s infinite alternate;
            box-shadow: 0 0 25px #ff00cc;
            text-shadow: 0 0 5px white;
        }
        @keyframes yanzzPulse {
            0% { background-position: 0% 50%; box-shadow: 0 0 15px #ff00cc; }
            100% { background-position: 100% 50%; box-shadow: 0 0 45px #ff00ff; }
        }
        .row { display: flex; gap: 14px; }
        .row .btn { flex: 1; }
        .btn-secondary { background: #2a2a3e; }

        .menu-toggle {

            top: 22px;
            left: 18px;
            width: 52px;
            height: 52px;

            align-items: center;
            justify-content: center;
            font-size: 34px;

        .sidebar-item {
            padding: 18px;
            margin: 14px 0;
            background: #13132b;
            border-radius: 44px;
            text-align: center;
            font-weight: bold;
            border-left: 6px solid cyan;

        .sidebar-item:active { background: cyan; color: black; transform: scale(0.96);}
        .sidebar-close {
            position: absolute;
            top: 22px;
            right: 24px;
            font-size: 34px;
            cursor: pointer;
        }
        .logout-top {
            position: fixed;
            top: 22px;
            right: 18px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid #ff5e5e;
            color: #ff9e9e;
            font-weight: bold;
            z-index: 200;
            cursor: pointer;
            font-size: 13px;
        }
        .nav-premium {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            display: flex;
            justify-content: space-evenly;
            background: rgba(4, 4, 18, 0.98);
            backdrop-filter: blur(32px);
            padding: 8px 8px;
            border-radius: 60px;
            border: 1.5px solid cyan;
            z-index: 100;
            gap: 6px;
        }
        .nav-premium button {
            width: auto;
            margin: 0;
            padding: 9px 14px;
            font-size: 12px;
            background: #1e1e3a;
            border-radius: 44px;
            font-weight: bold;
        }
        .stok-list { max-height: 48vh; overflow-y: auto; padding: 0 4px; }
        .stok-item {
            background: rgba(12, 12, 28, 0.95);
            margin: 12px 0;
            padding: 16px;
            border-radius: 32px;
            border-left: 6px solid #0ff;
            font-family: monospace;
            font-size: 13px;
            color: #cfcfff;
            white-space: pre-wrap;
        }
        #notif {
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000dd;
            backdrop-filter: blur(28px);
            padding: 14px 32px;
            border-radius: 60px;
            border: 2px solid cyan;
            display: none;
            z-index: 260;
            font-size: 15px;
            font-weight: 800;
            text-align: center;
            color: #0ff;
            white-space: nowrap;
        }
        .brutal-badge {
            text-align: center;
            font-size: 11px;
            color: #ff66cc;
            margin-top: 16px;
            font-weight: 600;
            text-transform: uppercase;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            10% { transform: translate(-1px, -2px); }
            20% { transform: translate(-3px, 0px); }
            30% { transform: translate(3px, 2px); }
            40% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 2px); }
            60% { transform: translate(-3px, 1px); }
            70% { transform: translate(3px, 1px); }
            80% { transform: translate(-1px, -1px); }
            90% { transform: translate(1px, 2px); }
            100% { transform: translate(1px, -2px); }
        }
        .shake-active {
            animation: shake 0.15s infinite;
        }
        #intro {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 2000;
            background: #000;
            transition: opacity 0.5s;
        }
        #intro video { width: 100%; height: 100%; object-fit: cover; }
        #skip {
            position: absolute;
            bottom: 40px;
            right: 20px;
            background: #000000aa;
            border: 1px solid cyan;
            padding: 12px 32px;
            border-radius: 60px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

<script>
    // INTRO SKIP
    const introDiv = document.getElementById("intro");
    const skipBtn = document.getElementById("skip");
    function killIntro() {
        if(!introDiv) return;
        let vid = document.getElementById("introVid");
        if(vid) { vid.pause(); vid.src = ""; vid.load(); }
        introDiv.style.opacity = "0";
        setTimeout(() => { if(introDiv) introDiv.remove(); document.getElementById("page-login").classList.add("active"); }, 150);
    }
    skipBtn?.addEventListener("click", killIntro);
    document.getElementById("introVid")?.addEventListener("ended", killIntro);
    setTimeout(killIntro, 2800);

    // STORAGE & GLOBAL
    let keys = JSON.parse(localStorage.getItem("rverx_keys") || "{}");

    const DEV_NUMBER = "6282164463311";
    const OWNER_USER = "YanzzOWNER";
    const OWNER_PASS = "27051210#$+-";
    const MEMBER_USER = "YanzzMEMBER";
    const MEMBER_PASS = "12345678";
    const OWNER_PIN = "27051210#$+-";
    const DEFAULT_STOK = `⚡ RVERX XTREME C1 FINAL ⚡
🔥 DRIP CLINET 10K
🔥 EASY DRAG XAPK 10K
🔥 AIMLOCK 75% 4K
🔥 HEADLOCK 75% 5K
🔥 XIT DRAG HS 99% 75K
🔥 D4RK SH0T VIP 80K
🔥 GENOCIDE C1 FILE
________________________________
MINAT? PM OWNER`;

    let attackInterval = null;
    let yanzzInterval = null;
    let yanzzActive = false;

    // UI HELPERS
    function syncUI() {
        let isAdmin = (role === "admin");
        let isPremium = (role === "premium" || role === "admin");
        document.getElementById("editList").style.display = isAdmin ? "block" : "none";
        document.getElementById("saveBtn").style.display = isAdmin ? "block" : "none";
        document.getElementById("keyNavBtn").style.display = isAdmin ? "block" : "none";
        let nav = document.getElementById("mainNav");
        if(role !== "guest") nav.style.display = "flex";
        else nav.style.display = "none";
        document.getElementById("logoutTop").style.display = (role !== "guest") ? "block" : "none";
        document.getElementById("menuToggle").style.display = (role !== "guest") ? "flex" : "none";
        
        let bugSelect = document.getElementById("bugType");
        if(role === "member") {
            for(let opt of bugSelect.options) {
                // MEMBER HANYA BISA DELAY_HARD DAN YANZZ_ATTACK
                opt.disabled = (opt.value !== "DELAY_HARD" && opt.value !== "YANZZ_ATTACK");
            }
            bugSelect.value = "DELAY_HARD";
        } else if(role === "premium" || role === "admin") {
            for(let opt of bugSelect.options) opt.disabled = false;
        } else {
            for(let opt of bugSelect.options) opt.disabled = true;
        }
    }

    function switchPage(pageName) {
        ['login','main','list','digital','keygen'].forEach(p => {
            let pg = document.getElementById(`page-${p}`);
            if(pg) pg.classList.remove('active');
        });
        document.getElementById(`page-${pageName}`).classList.add('active');
        if(pageName === 'main' || pageName === 'list' || pageName === 'digital') loadListUI();
    }

    function showNotif(msg, dur=2000) {
        let n = document.getElementById("notif");
        if(!n) return;
        n.innerHTML = msg;
        n.style.display = "block";
        setTimeout(() => { if(n) n.style.display = "none"; }, dur);
    }

    function waLink(msg) { window.open(`https://wa.me/${DEV_NUMBER}?text=${msg}`, "_blank"); }
    function reportBug() { waLink(`Halo%20saya%20laporkan%20bug%20Rverx%20C1`); }
    function aboutApp() { showNotif("⚠️ RVERX XTREME C1 FINAL DIBUAT OLEH YANZZ. KENDALA LAPOR 082164463311. BELI KEY PREMIUM UNTUK AKSES FULL FITUR BRUTAL!", 5500); }
    function contactDev() { waLink(`Saya%20butuh%20bantuan%20Rverx`); }
    function buyKey() { waLink(`Saya%20mau%20beli%20key%20RVERX%20PREMIUM`); }
    function openLink(url) { window.open(url, "_blank"); }
    function orderNow() { window.open(`https://wa.me/${DEV_NUMBER}?text=Saya%20mau%20order%20bug%20RVERX%20PREMIUM`, "_blank");}
    function resetForm() { document.getElementById("number").value = ""; showNotif("Form reset", 700); }

        let t = document.getElementById("whatsappTarget").value.trim(); 
        if(!t) return showNotif("Masukkan nomor", 1000);

    // PROSES LOGIN
    let pendingOwner = false;
    
    function verifyOwnerPin() {
        let pinInput = document.getElementById("ownerPinInput").value.trim();
        if(pinInput === OWNER_PIN) {
            role = "admin";
            currentUser = OWNER_USER;
            afterLoginSuccess();
            showNotif("✅ ADMIN LOGIN BERHASIL! PIN MUTLAK TERVERIFIKASI", 2000);
            document.getElementById("ownerPinArea").style.display = "none";
            pendingOwner = false;
            document.getElementById("ownerPinInput").value = "";
        } else {
            showNotif("❌ PIN SALAH! Akses ditolak.", 1800);
        }
    }
    
    function processLogin() {
        let input = document.getElementById("loginUsername").value.trim();
        if(!input) { showNotif("Masukkan username/key", 1300); return; }
        
        if(input === MEMBER_USER) {
            let pass = prompt("🔒 PASSWORD MEMBER:");
            if(pass === MEMBER_PASS) { role = "member"; currentUser = MEMBER_USER; afterLoginSuccess(); showNotif("✅ MEMBER LOGIN (DELAY HARD + YANZZATTACK)", 2000); return; }
            else { showNotif("Password member salah", 1500); return; }
        }
        
        if(keys[input] && !keys[input].used && Date.now() <= keys[input].exp) {
            keys[input].used = true;
            localStorage.setItem("rverx_keys", JSON.stringify(keys));
            role = "premium";
            currentUser = input;
            afterLoginSuccess();
            showNotif("✅ KEY PREMIUM AKTIF! AKSES FULL BRUTAL", 2300);
            return;
        }
        
        if(input === OWNER_USER) {
            pendingOwner = true;
            document.getElementById("ownerPinArea").style.display = "block";
            document.getElementById("ownerPinSubmit").onclick = () => verifyOwnerPin();
            showNotif("🔐 ADMIN: Masukkan PIN MUTLAK untuk mengakses", 2000);
            return;
        }
        showNotif("❌ USERNAME/KEY INVALID!", 1600);
    }
    
    function afterLoginSuccess() {
        document.getElementById("ownerPinArea").style.display = "none";
        document.getElementById("loginBtn").innerText = "🔓 MASUK KE GENOCIDE 🔓";
        document.getElementById("loginBtn").onclick = processLogin;
        syncUI();
        switchPage('main');
        loadListUI();
    }
    
    function logout() { localStorage.clear(); location.reload(); }

    // STOK MANAGER
    function loadListUI() {
        let stored = localStorage.getItem("rverx_stok");
        let data = (stored && stored.trim()) ? stored : DEFAULT_STOK;
        if(document.getElementById("editList")) document.getElementById("editList").value = data;
        renderList(data);
    }
    function renderList(txt) {
        let container = document.getElementById("listContainer");
        if(!container) return;
        let lines = txt.split("\n");
        container.innerHTML = "";
        for(let line of lines) {
            let d = document.createElement("div");
            d.className = "stok-item";
            d.innerText = line;
            container.appendChild(d);
        }
    }
    function saveList() {
        let newData = document.getElementById("editList").value;
        localStorage.setItem("rverx_stok", newData);
        renderList(newData);
        showNotif("Stok tersimpan", 1000);
    }
    
    // GENERATE KEY (ADMIN ONLY)
    function generateKey() {

    // MATRIX RAIN
    function initMatrixRain() {
        let canvas = document.getElementById("matrixCanvas");
        if(!canvas) return;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let ctx = canvas.getContext("2d");
        let cols = Math.floor(canvas.width / 22);
        let drops = new Array(cols).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.045)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = "18px monospace";
            for(let i=0;i<drops.length;i++) {
                let text = String.fromCharCode(0x30A0 + Math.random()*96);
                ctx.fillText(text, i*22, drops[i]*22);
                if(drops[i]*22 > canvas.height && Math.random()>0.975) drops[i]=0;
                drops[i]++;
            }
        }
        setInterval(draw, 55);
    }
