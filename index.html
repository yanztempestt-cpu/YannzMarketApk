<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YANZZ MARKET</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  color:white;
  text-align:center;
  background:url('bg.jpg') no-repeat center center;
  background-size:cover;
}

body::before{
  content:'';
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  z-index:-1;
}

.container{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:rgba(30,41,59,0.85);
  padding:20px;
  border-radius:20px;
  width:320px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 20px rgba(255,0,150,0.5);
}

input{
  width:90%;
  padding:10px;
  margin:8px;
  border-radius:10px;
  border:none;
}

button{
  width:90%;
  padding:12px;
  margin:8px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#16a34a;
}

.hidden{display:none}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
  <div class="card">
    <h2>🔐 LOGIN</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">MASUK</button>
  </div>
</div>

<!-- MAIN -->
<div id="mainPage" class="container hidden">
  <div class="card">
    <h2>YANZZ STORE ⚓</h2>

    <button onclick="joinChannel()">JOIN WHATSAPP</button>
    <button onclick="joinGroup()">JOIN GRUP</button>
    <button onclick="openList()">LIST ITEM</button>
    <button onclick="order()">ORDER</button>
    <button onclick="openReward()">OPEN REWARD</button>

    <div id="rewardBox" class="hidden">
      <h3>🎁 REWARD</h3>
      <p id="rewardText"></p>
    </div>

    <div id="adminPanel" class="hidden">
      <h3>👑 ADMIN PANEL</h3>
      <input id="newReward" placeholder="Ubah reward">
      <button onclick="saveReward()">UPDATE</button>
    </div>
  </div>
</div>

<!-- LIST PAGE -->
<div id="listPage" class="container hidden">
  <div class="card">
    <h2>📦 PILIH KATEGORI</h2>

    <button onclick="orderFile()">📁 FILE FF</button>
    <button onclick="orderPanel()">🧩 PANEL</button>
    <button onclick="orderWeb()">🌐 WEB & APK</button>

    <button onclick="backHome()">⬅ KEMBALI</button>
  </div>
</div>

<script>

// AUTO LOGIN
if(localStorage.getItem("role")==="member"){
  showMain(false);
}
if(localStorage.getItem("role")==="admin"){
  showMain(true);
}

// LOGIN
function login(){
  let u=user.value;
  let p=pass.value;

  if(u==="YanzzMEMBER" && p==="12345678"){
    localStorage.setItem("role","member");
    showMain(false);
  }
  else if(u==="OWNER_YANZZ" && p==="27051210#$+-"){
    localStorage.setItem("role","admin");
    showMain(true);
  }
  else{
    alert("Login salah!");
  }
}

// SHOW MAIN
function showMain(admin){
  loginPage.style.display="none";
  mainPage.classList.remove("hidden");

  if(admin){
    adminPanel.classList.remove("hidden");
  }
}

// JOIN
function joinChannel(){
  localStorage.setItem("joinWA","1");
  window.open("https://whatsapp.com/channel/0029VbCWWN96rsQsfLC0B71f");
}

function joinGroup(){
  localStorage.setItem("joinGR","1");
  window.open("https://chat.whatsapp.com/HZJVWkSLsECBV7f1S4FpxN?mode=gi_t");
}

// ORDER WA
function order(){
  window.open("https://wa.me/6282164463311");
}

// AUTO CHAT
function orderFile(){
  let msg = encodeURIComponent("BG MAU ORDER FILE\nMINTA LIST");
  window.open("https://wa.me/6282164463311?text="+msg);
}

function orderPanel(){
  let msg = encodeURIComponent("BG MAU ORDER PANEL\nMINTA");
  window.open("https://wa.me/6282164463311?text="+msg);
}

function orderWeb(){
  let msg = encodeURIComponent("BG MAU BUY KEBUTUHAN DIGITAL");
  window.open("https://wa.me/6282164463311?text="+msg);
}

// REWARD DEFAULT
if(!localStorage.getItem("reward")){
  localStorage.setItem("reward","DISKON 50% 🔥");
}

// OPEN REWARD
function openReward(){
  if(localStorage.getItem("joinWA") && localStorage.getItem("joinGR")){
    rewardBox.classList.remove("hidden");
    rewardText.innerText = localStorage.getItem("reward");
  }else{
    alert("Harus join dulu!");
  }
}

// ADMIN
function saveReward(){
  let val=newReward.value;
  localStorage.setItem("reward",val);
  alert("Updated!");
}

// NAVIGATION
function openList(){
  mainPage.classList.add("hidden");
  listPage.classList.remove("hidden");
}

function backHome(){
  listPage.classList.add("hidden");
  mainPage.classList.remove("hidden");
}

</script>

</body>
</html>
