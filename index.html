<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rverx</title>

<style>
body{margin:0;font-family:sans-serif;background:black;color:white;overflow:hidden}

/* BG VIDEO */
.bg{
 position:fixed;
 width:100%;
 height:100%;
 object-fit:cover;
 filter:blur(8px) brightness(0.4);
 z-index:-1;
}

/* INTRO */
#intro video{
 position:fixed;
 width:100%;
 height:100%;
 object-fit:cover;
}
#skip{
 position:fixed;
 top:10px;
 right:10px;
 padding:6px 10px;
 background:rgba(0,0,0,0.2);
 color:#fff;
 border:none;
 border-radius:8px;
 font-size:12px;
}

/* LOGO */
.logo{
 width:90px;
 height:90px;
 border-radius:50%;
 display:block;
 margin:10px auto;
 box-shadow:0 0 15px cyan;
}

/* BOX */
.box{
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(10px);
 margin:10px;
 padding:15px;
 border-radius:15px;
}

/* INPUT */
input,select,textarea{
 width:100%;
 padding:10px;
 margin:5px 0;
 border:none;
 border-radius:10px;
 background:#111;
 color:white;
}

/* BUTTON */
button{
 width:100%;
 padding:10px;
 margin:5px 0;
 border:none;
 border-radius:10px;
 background:linear-gradient(45deg,cyan,blue);
 color:white;
}

/* NAV */
.nav{
 position:fixed;
 bottom:0;
 width:100%;
 display:none;
 justify-content:space-around;
 background:#000;
}
.nav button{font-size:12px}

/* PAGE */
.page{display:none}
.active{display:block}

/* LIST */
.list{max-height:50vh;overflow:auto}
.item{padding:8px;margin:5px;background:#111;border-radius:10px}

/* NOTIF */
#notif{
 position:fixed;
 bottom:80px;
 left:50%;
 transform:translateX(-50%);
 background:#000;
 padding:10px;
 border-radius:10px;
 border:1px solid cyan;
 display:none;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<video src="https://files.catbox.moe/7s41d3.mp4" autoplay muted></video>
<button id="skip" onclick="startApp()">SKIP</button>
</div>

<!-- BG -->
<video class="bg" src="https://files.catbox.moe/lnj4we.mp4" autoplay loop muted></video>

<!-- LOGIN -->
<div id="login" class="page">
<img src="https://files.catbox.moe/bi2bn4.png" class="logo">
<div class="box">
<input id="user" placeholder="USERNAME / KEY">
<input id="pass" placeholder="PASSWORD (optional)">
<button onclick="login()">LOGIN</button>
</div>
</div>

<!-- MAIN -->
<div id="main" class="page">

<img src="https://files.catbox.moe/bi2bn4.png" class="logo">

<!-- TYPE -->
<div id="type" class="box">

<video id="typeVideo" autoplay loop muted style="width:100%;border-radius:12px;margin-bottom:10px;">
<source src="https://files.catbox.moe/lnj4we.mp4">
</video>

<input id="number" placeholder="62XXXXXXXX">

<select id="bugType">
<option value="DELAY HARD">DELAY HARD</option>
<option value="FORCE CLOSE">FORCE CLOSE</option>
<option value="BLANK UI">BLANK UI</option>
<option value="ATTACK IOS">ATTACK IOS</option>
</select>

<button onclick="run()">KONFIRMASI</button>

</div>

<!-- LIST -->
<div id="list" class="box" style="display:none">
<div class="list"></div>
</div>

<!-- DIGITAL -->
<div id="digital" class="box" style="display:none">
<button onclick="openLink('https://chat.whatsapp.com/HZJVWkSLsECBV7f1S4FpxN')">JOIN FJB</button>
<button onclick="openLink('https://whatsapp.com/channel/0029VbCWWN96rsQsfLC0B71f')">SALURAN</button>
<button onclick="openLink('https://www.instagram.com/yanzzzmarket')">INSTAGRAM</button>
<button onclick="openLink('https://youtube.com/@king_of_file')">YOUTUBE</button>
<button onclick="wa('SAYA MAU ORDER')">ORDER</button>
</div>

<!-- KEY -->
<div id="key" class="box" style="display:none">
<input id="newKey" placeholder="MASUKAN KEY">
<select id="durasi">
<option value="1">1 HARI</option>
<option value="3">3 HARI</option>
<option value="7">7 HARI</option>
<option value="30">1 BULAN</option>
<option value="9999">PERMANEN</option>
</select>
<button onclick="generateKey()">GENERATE</button>
</div>

<!-- EDIT LIST -->
<div id="edit" class="box" style="display:none">
<textarea id="editList"></textarea>
<button onclick="saveList()">SAVE LIST</button>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="tab('type')">TYPE</button>
<button onclick="tab('list')">LIST</button>
<button onclick="tab('digital')">DIGITAL</button>
<button id="keyBtn" onclick="tab('key')" style="display:none">KEY</button>
<button id="editBtn" onclick="tab('edit')" style="display:none">EDIT</button>
<button onclick="logout()">LOGOUT</button>
</div>

<div id="notif"></div>

<script>

let role="guest"
let premUse=localStorage.getItem("premUse")||0
let keys=JSON.parse(localStorage.getItem("keys")||"{}")

let defaultList=`⚓ STOK YANZZ ⚓
AIMLOCK 75% 4K
HEADLOCK 75% 5K
BODY LOCK V1 5K`

function startApp(){
 intro.style.display="none"
 login.classList.add("active")
}

/* LOGIN */
function login(){

 if(user.value==="YanzzMEMBER" && pass.value==="12345678"){
  role="member"
 }
 else if(user.value==="YanzzPREM" && pass.value==="1111111"){
  if(premUse>=2) return alert("Limit habis")
  premUse++
  localStorage.setItem("premUse",premUse)
  role="prem"
 }
 else if(user.value==="YanzzOWNER" && pass.value==="27051210#$+-"){
  role="admin"
  keyBtn.style.display="block"
  editBtn.style.display="block"
 }
 else if(keys[user.value]){
  let k=keys[user.value]
  if(Date.now()>k.exp) return alert("Key expired")
  role="prem"
 }
 else{
  alert("Login gagal")
  return
 }

 loginPageOff()
 applyRoleUI()
 loadList()
}

function loginPageOff(){
 login.classList.remove("active")
 main.classList.add("active")
 document.querySelector(".nav").style.display="flex"
}

/* ROLE LOCK */
function applyRoleUI(){
 let select=bugType

 if(role==="member"){
  select.value="DELAY HARD"
  [...select.options].forEach(o=>{
   if(o.value!=="DELAY HARD") o.disabled=true
  })
 }
}

/* LIST */
function loadList(){
 let data=localStorage.getItem("list")||defaultList
 editList.value=data
 renderList()
}

function renderList(){
 let data=localStorage.getItem("list")||defaultList
 let c=document.querySelector("#list .list")
 c.innerHTML=""
 data.split("\n").forEach(t=>{
  let d=document.createElement("div")
  d.className="item"
  d.innerText=t
  c.appendChild(d)
 })
}

function saveList(){
 localStorage.setItem("list",editList.value)
 alert("List disimpan")
 renderList()
}

/* TAB */
function tab(t){
 type.style.display="none"
 list.style.display="none"
 digital.style.display="none"
 key.style.display="none"
 edit.style.display="none"

 document.getElementById(t).style.display="block"
}

/* SIMULASI */
function run(){
 let num=number.value
 let type=bugType.value

 if(!num) return alert("Isi nomor")

 if(role==="member"){
  type="DELAY HARD"
  bugType.value="DELAY HARD"
 }

 notif.style.display="block"
 notif.innerHTML=`TARGET: ${num}<br>TYPE: ${type}<br>STATUS: LOADING 70%`

 setTimeout(()=>{
  notif.innerHTML+=`<br>STATUS: SUCCESS`
 },1500)
}

/* KEY */
function generateKey(){
 let k=newKey.value
 if(keys[k]) return alert("Key sudah ada")

 let d=durasi.value
 let exp=Date.now()+(d*86400000)

 keys[k]={exp}
 localStorage.setItem("keys",JSON.stringify(keys))

 alert("Key dibuat")
}

/* LINK */
function openLink(url){window.open(url)}

/* WA */
function wa(t){
 window.open("https://wa.me/6282164463311?text="+encodeURIComponent(t))
}

/* LOGOUT */
function logout(){location.reload()}

</script>

</body>
</html>
