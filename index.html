<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rverx</title>

<style>
body{margin:0;font-family:sans-serif;background:black;color:white;overflow:hidden}

/* VIDEO BG */
.bg{
 position:fixed;
 width:100%;
 height:100%;
 object-fit:cover;
 filter:blur(8px) brightness(0.4);
 z-index:-1;
}

/* INTRO */
#intro video{
 position:fixed;
 width:100%;
 height:100%;
 object-fit:cover;
}
#skip{
 position:fixed;
 top:10px;
 right:10px;
 padding:8px;
 background:#000;
 color:#fff;
 border:none;
}

/* LOGO */
.logo{
 width:90px;
 height:90px;
 border-radius:50%;
 display:block;
 margin:10px auto;
 box-shadow:0 0 15px cyan;
}

/* BOX */
.box{
 background:rgba(0,0,0,0.6);
 backdrop-filter:blur(10px);
 margin:10px;
 padding:15px;
 border-radius:15px;
}

/* INPUT */
input,select{
 width:100%;
 padding:10px;
 margin:5px 0;
 border:none;
 border-radius:10px;
 background:#111;
 color:white;
}

/* BUTTON */
button{
 width:100%;
 padding:10px;
 margin:5px 0;
 border:none;
 border-radius:10px;
 background:linear-gradient(45deg,cyan,blue);
 color:white;
}

/* NAV */
.nav{
 position:fixed;
 bottom:0;
 width:100%;
 display:flex;
 justify-content:space-around;
 background:#000;
}
.nav button{font-size:12px}

/* PAGE */
.page{display:none}
.active{display:block}

/* LIST */
.list{max-height:50vh;overflow:auto}
.item{padding:8px;margin:5px;background:#111;border-radius:10px}

/* NOTIF */
#notif{
 position:fixed;
 bottom:80px;
 left:50%;
 transform:translateX(-50%);
 background:#000;
 padding:10px;
 border-radius:10px;
 border:1px solid cyan;
 display:none;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<video id="introVid" src="https://files.catbox.moe/7s41d3.mp4" autoplay muted></video>
<button id="skip" onclick="startApp()">SKIP</button>
</div>

<!-- BG -->
<video class="bg" src="https://files.catbox.moe/lnj4we.mp4" autoplay loop muted></video>

<!-- LOGIN -->
<div id="login" class="page">
<img src="https://files.catbox.moe/bi2bn4.png" class="logo">
<div class="box">
<input id="user" placeholder="USERNAME">
<input id="pass" placeholder="PASSWORD">
<button onclick="login()">LOGIN</button>
</div>
</div>

<!-- MAIN -->
<div id="main" class="page">

<img src="https://files.catbox.moe/bi2bn4.png" class="logo">

<!-- TYPE -->
<div id="type" class="box">

<video id="typeVideo" autoplay loop muted style="width:100%;border-radius:12px;margin-bottom:10px;">
<source src="https://files.catbox.moe/lnj4we.mp4">
</video>

<input id="number" placeholder="62XXXXXXXX">

<select id="bugType">
<option>DELAY HARD</option>
<option>FORCE CLOSE</option>
<option>BLANK UI</option>
<option>ATTACK IOS</option>
</select>

<button onclick="run()">KONFIRMASI</button>

<div style="font-size:12px;opacity:0.8;margin-top:10px">
SIMULASI RVERX ⚠️<br>
Order: 082164463311
</div>

</div>

<!-- LIST -->
<div id="list" class="box" style="display:none">
<div class="list">
<div class="item">⚓ STOK YANZZ ⚓</div>
<div class="item">AIMLOCK 75% 4K</div>
<div class="item">HEADLOCK 75% 5K</div>
<div class="item">BODY LOCK V1 5K</div>
<div class="item">DLL LENGKAP...</div>
</div>
</div>

<!-- DIGITAL -->
<div id="digital" class="box" style="display:none">
<button onclick="openLink('https://chat.whatsapp.com/HZJVWkSLsECBV7f1S4FpxN')">📢 JOIN FJB</button>
<button onclick="openLink('https://whatsapp.com/channel/0029VbCWWN96rsQsfLC0B71f')">📡 SALURAN</button>
<button onclick="openLink('https://www.instagram.com/yanzzzmarket')">📷 INSTAGRAM</button>
<button onclick="openLink('https://youtube.com/@king_of_file')">▶️ YOUTUBE</button>
<button onclick="wa('SAYA MAU ORDER')">🛒 ORDER</button>
</div>

<!-- KEY ADMIN -->
<div id="key" class="box" style="display:none">
<input id="newKey" placeholder="MASUKAN KEY">
<select id="durasi">
<option value="1">1 HARI</option>
<option value="3">3 HARI</option>
<option value="7">7 HARI</option>
<option value="30">1 BULAN</option>
<option value="9999">PERMANEN</option>
</select>
<button onclick="generateKey()">GENERATE</button>
</div>

</div>

<!-- NAV -->
<div class="nav">
<button onclick="tab('type')">TYPE</button>
<button onclick="tab('list')">LIST</button>
<button onclick="tab('digital')">DIGITAL</button>
<button id="keyBtn" onclick="tab('key')" style="display:none">KEY</button>
<button onclick="logout()">LOGOUT</button>
</div>

<div id="notif"></div>

<script>

let role="guest"
let premUse=localStorage.getItem("premUse")||0
let keys=JSON.parse(localStorage.getItem("keys")||"{}")

function startApp(){
 document.getElementById("intro").style.display="none"
 document.getElementById("login").classList.add("active")
}

/* LOGIN */
function login(){

 if(user.value==="YanzzMEMBER" && pass.value==="12345678"){
  role="member"
 }
 else if(user.value==="YanzzPREM" && pass.value==="1111111"){
  if(premUse>=2) return alert("Limit habis")
  premUse++
  localStorage.setItem("premUse",premUse)
  role="prem"
 }
 else if(user.value==="YanzzOWNER" && pass.value==="27051210#$+-"){
  role="admin"
  keyBtn.style.display="block"
 }
 else if(keys[user.value]){
  let k=keys[user.value]
  if(Date.now()>k.exp) return alert("Key expired")
  role="prem"
 }
 else{
  alert("Login gagal")
  return
 }

 loginPageOff()
}

function loginPageOff(){
 document.getElementById("login").classList.remove("active")
 document.getElementById("main").classList.add("active")
}

/* TAB */
function tab(t){
 type.style.display="none"
 list.style.display="none"
 digital.style.display="none"
 key.style.display="none"

 document.getElementById(t).style.display="block"

 if(t==="type"){
  let v=document.getElementById("typeVideo")
  v.currentTime=0
  v.play()
 }
}

/* WA */
function wa(text){
 window.open("https://wa.me/6282164463311?text="+encodeURIComponent(text))
}

/* LINK */
function openLink(url){
 window.open(url)
}

/* SIMULASI */
function run(){
 let num=number.value
 let type=bugType.value

 if(!num) return alert("Isi nomor")

 if(role==="member" && type!=="DELAY HARD"){
  return alert("Member hanya DELAY")
 }

 notif.style.display="block"
 notif.innerHTML=`TARGET: ${num}<br>TYPE: ${type}<br>STATUS: LOADING 70%`

 setTimeout(()=>{
  notif.innerHTML+=`<br>STATUS: SUCCESS`
 },1500)
}

/* KEY */
function generateKey(){
 let k=newKey.value
 if(keys[k]) return alert("Key sudah ada")

 let d=durasi.value
 let exp=Date.now()+(d*86400000)

 keys[k]={exp}
 localStorage.setItem("keys",JSON.stringify(keys))

 alert("Key berhasil dibuat")
}

/* LOGOUT */
function logout(){
 location.reload()
}

</script>

</body>
</html>
