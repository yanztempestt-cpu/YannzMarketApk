<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rverx</title><style>
body{margin:0;background:black;color:#00ffcc;font-family:monospace;overflow:hidden}
video.bg{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:-2;filter:blur(6px) brightness(0.4)}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:-1}
.logo{width:90px;border-radius:50%;display:block;margin:10px auto;box-shadow:0 0 15px #00ffcc}
.box{background:rgba(0,0,0,0.7);margin:10px;padding:15px;border-radius:12px;text-align:center}
input,select{width:90%;padding:10px;margin:5px;background:black;border:1px solid #00ffcc;color:#00ffcc}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:#00ffcc;color:black;font-weight:bold}
.row{display:flex}
.tab{display:none}
.active{display:block}
.menu-tabs{display:flex;justify-content:space-around;margin:10px}
.menu-tabs button{flex:1;margin:2px}
.list{max-height:250px;overflow:auto;text-align:left}
.item{padding:6px;border-bottom:1px solid #00ffcc}
</style></head><body><!-- INTRO --><div id="intro">
<video src="https://files.catbox.moe/7s41d3.mp4" autoplay muted class="bg"></video>
<div class="overlay"></div>
<div class="box">
<h2>Rverx Loading...</h2>
<button onclick="skipIntro()">SKIP</button>
</div>
</div><!-- LOGIN --><div id="login" style="display:none">
<video src="https://files.catbox.moe/7s41d3.mp4" autoplay muted loop class="bg"></video>
<div class="overlay"></div>
<img src="https://files.catbox.moe/bi2bn4.png" class="logo">
<div class="box">
<input id="user" placeholder="USERNAME">
<input id="pass" placeholder="PASSWORD">
<button onclick="login()">LOGIN</button>
</div>
</div><!-- MENU --><div id="menu" style="display:none">
<video src="https://files.catbox.moe/7s41d3.mp4" autoplay muted loop class="bg"></video>
<div class="overlay"></div>
<img src="https://files.catbox.moe/bi2bn4.png" class="logo"><div class="menu-tabs">
<button onclick="openTab('type')">TYPE</button>
<button onclick="openTab('list')">LIST</button>
<button onclick="openTab('digital')">DIGITAL</button>
<button id="keyBtn" onclick="openTab('key')">KEY</button>
</div><!-- TYPE --><div id="type" class="tab active">
<div class="box">
<input id="number" placeholder="62XXXXXXXX">
<select id="bug">
<option>DELAY HARD</option>
<option>FORCE CLOSE</option>
<option>BLANK UI</option>
<option>ATTACK IOS</option>
</select>
<button onclick="run()">RUN</button>
<div id="result"></div>
</div>
</div><!-- LIST --><div id="list" class="tab">
<div class="box list" id="listData"></div>
</div><!-- DIGITAL --><div id="digital" class="tab">
<div class="box">
<button onclick="go('https://wa.me/6282164453311')">ORDER WA</button>
<button onclick="go('https://instagram.com')">INSTAGRAM</button>
<button onclick="go('https://youtube.com')">YOUTUBE</button>
</div>
</div><!-- KEY --><div id="key" class="tab">
<div class="box">
<input id="newKey" placeholder="MASUKAN KEY">
<select id="durasi">
<option>1HARI</option>
<option>3HARI</option>
<option>7HARI</option>
<option>1BULAN</option>
<option>PERMANEN</option>
</select>
<button onclick="generateKey()">GENERATE</button>
<div id="keyList"></div>
</div>
</div><button onclick="logout()">LOGOUT</button>

</div><script>
let role="";

function skipIntro(){
 intro.style.display="none";
 login.style.display="block";
}

function login(){
 let u=user.value,p=pass.value;

 if(u=="YanzzMEMBER" && p=="12345678"){role="member"}
 else if(u=="YanzzPREM" && p=="1111111"){
 let count=localStorage.getItem("prem")||0;
 if(count>=2) return alert("Limit habis");
 localStorage.setItem("prem",++count);
 role="prem";
 }
 else if(u=="YanzzOWNER" && p=="27051210#$+-"){role="admin"}
 else if(localStorage.getItem("key_"+u)){
 let data=JSON.parse(localStorage.getItem("key_"+u));
 if(data.exp && Date.now()>data.exp) return alert("Key expired");
 role="key";
 }
 else return alert("Login gagal");

 login.style.display="none";
 menu.style.display="block";
 if(role!="admin") keyBtn.style.display="none";
 loadList();loadKeys();
}

function logout(){location.reload()}

function openTab(id){
 document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

function run(){
 let num=number.value;
 let type=bug.value;
 if(role=="member" && type!="DELAY HARD") return alert("Member hanya delay");
 result.innerHTML="TARGET: "+num+"<br>TYPE: "+type+"<br>STATUS: SUCCESS (SIMULASI)";
}

function go(url){window.open(url)}

function loadList(){
 let text=`⚓STOK YANZZ⚓\n- AIMLOCK 75% 4K\n- HEADLOCK 75% 5K\n- BODY LOCK V1 5K\n- DLL`;
 listData.innerText=text;
}

function generateKey(){
 let k=newKey.value;
 if(localStorage.getItem("key_"+k)) return alert("Key sudah ada");
 let d=durasi.value;
 let exp=null;
 if(d!="PERMANEN"){
 let ms={"1HARI":86400000,"3HARI":259200000,"7HARI":604800000,"1BULAN":2592000000}[d];
 exp=Date.now()+ms;
 }
 localStorage.setItem("key_"+k,JSON.stringify({exp}));
 loadKeys();
}

function loadKeys(){
 keyList.innerHTML="";
 for(let i in localStorage){
 if(i.startsWith("key_")){
 let div=document.createElement("div");
 div.innerText=i;
 keyList.appendChild(div);
 }
 }
}
</script></body>
</html>
